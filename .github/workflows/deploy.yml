name: Deploy 아우름사주 to GitHub Pages

on:
  push:
    branches:
      - main   # main 브랜치 push 시 자동 배포

permissions:
  contents: read
  pages:    write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # ── 1. 소스 체크아웃 ──────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Groq API 키 치환 ───────────────────────────────
      #    GitHub Secrets의 GROQ_API_KEY 값으로
      #    index.html 안의 GROQ_KEY_PLACEHOLDER를 교체
      - name: Inject Groq API Key
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          sed -i "s|GROQ_KEY_PLACEHOLDER|${GROQ_API_KEY}|g" index.html

          # 치환 성공 여부 검증 (플레이스홀더가 남아있으면 실패)
          if grep -q "GROQ_KEY_PLACEHOLDER" index.html; then
            echo "ERROR: API 키 치환 실패 - Secrets 설정을 확인하세요."
            exit 1
          else
            echo "OK: API 키 치환 완료"
          fi

      # ── 3. GitHub Pages 설정 ─────────────────────────────
      - name: Setup Pages
        uses: actions/configure-pages@v4

      # ── 4. 배포 파일 업로드 ───────────────────────────────
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      # ── 5. 배포 ──────────────────────────────────────────
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
