<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Gemini 사주 실시간 테스트</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function SajuApp() {
            // ★ 테스트를 위해 여기에 실제 API 키를 잠시 넣어서 확인해 보세요 ★
            const [apiKey, setApiKey] = useState(''); 
            const [name, setName] = useState('');
            const [result, setResult] = useState('');
            const [loading, setLoading] = useState(false);

            const analyzeSaju = async () => {
                if (!apiKey) return alert("API 키를 입력해주세요!");
                setLoading(true);
                setResult("운명을 분석 중입니다...");

                // 1. 구글이 요구하는 가장 정확한 주소 형식 (v1beta + :generateContent)
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;

                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{
                                parts: [{ text: `${name}이라는 사람의 사주를 명리학적으로 분석해서 올해 운세를 아주 자세하게 알려줘.` }]
                            }]
                        })
                    });

                    const data = await response.json();

                    if (response.ok) {
                        // 결과 추출
                        setResult(data.candidates[0].content.parts[0].text);
                    } else {
                        // 에러 발생 시 상세 메시지 출력
                        setResult(`에러 발생: ${data.error.message}\n(코드: ${data.error.code})`);
                    }
                } catch (error) {
                    setResult("네트워크 에러가 발생했습니다.");
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div class="p-8 bg-white rounded-xl shadow-lg max-w-md w-full">
                    <h1 class="text-2xl font-bold mb-6 text-center text-indigo-600">Gemini 사주 분석기</h1>
                    
                    <div class="space-y-4">
                        <input type="password" placeholder="Gemini API Key 입력" 
                            class="w-full p-2 border rounded" 
                            value={apiKey} onChange={(e) => setApiKey(e.target.value)} />
                        
                        <input type="text" placeholder="이름 입력" 
                            class="w-full p-2 border rounded" 
                            value={name} onChange={(e) => setName(e.target.value)} />
                        
                        <button onClick={analyzeSaju} disabled={loading}
                            class="w-full bg-indigo-600 text-white p-3 rounded font-bold hover:bg-indigo-700 disabled:bg-gray-400">
                            {loading ? "분석 중..." : "운세 보기"}
                        </button>
                    </div>

                    <div class="mt-6 p-4 bg-gray-50 rounded border min-h-[100px] whitespace-pre-wrap">
                        {result}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<SajuApp />);
    </script>
</body>
</html>
