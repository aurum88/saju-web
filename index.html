function getSaju(birthdate,birthHour){
  const p=(birthdate||'2000-01-01').split('-');

  const h=parseInt(birthHour)||0;

  const yS=GANJIS[yIdx]||GANJIS[0];
  const mJ=MON_JJ[m]||"인";
  const a=Math.floor((14-m)/12);
  const yy=y-a,mm=m+12*a-2;
  const jd=d+Math.floor((153*mm+2)/5)+365*yy+Math.floor(yy/4)-Math.floor(yy/100)+Math.floor(yy/400)-32045;

  const hJ=hJiArr[Math.min(11,Math.floor((h+1)/2))];
  return{ySaju:yS,mJi:mJ,dSaju:dS,hJi:hJ,yGan:yS[0],yJi:yS[1],dGan:dS[0],dJi:dS[1],ti:JJ_TI[yS[1]]||"용",y,m,d,h,tiTxt:(JJ_TI[yS[1]]||"용")+"띠"};
}

function gseed(f){
  const name=(f.name||'가')+(f.chineseName||'');
  const b=(f.birthdate||'2000-01-01').split('-').map(Number);
  const hour=parseInt(f.birthHour)||0;
  const gender=f.gender==='male'?3:f.gender==='female'?7:1;
  const base=name.split('').reduce((a,c)=>a+c.charCodeAt(0)*31,0)
    +(b[0]||2000)*367+(b[1]||1)*29+(b[2]||1)*11+hour*97+gender*53
    +(f.city||'').split('').reduce((a,c)=>a+c.charCodeAt(0)*17,0)

    +(f.concern||'wealth').split('').reduce((a,c)=>a+c.charCodeAt(0)*13,0);
  return Math.abs(base)%999983;
}

  addG(sj.yGan);addJ(sj.yJi);addJ(sj.mJi);addG(sj.dGan);addJ(sj.dJi);addJ(sj.hJi);
  if(gender==='male'){cnt.화+=0.6;cnt.목+=0.4;}else{cnt.수+=0.6;cnt.금+=0.4;}
  Object.keys(cnt).forEach(k=>{cnt[k]+=rand()*0.6;if(cnt[k]<0.5)cnt[k]=0.5+rand()*0.3;});

  return OHENG.map(o=>({...o,pct:Math.round((cnt[km[o.name]]||0)/tot*100)}));

    career:cs(dom.name.includes("화")?7:dom.name.includes("목")?4:mb*.5),
    health:cs(dom.name.includes("목")?6:dom.name.includes("수")?4:0),
    mentor:cs(weak.pct<12?9:weak.pct<17?5:0),
    study: cs(dom.name.includes("금")?7:dom.name.includes("수")?5:0),
  };
  const week=WDAYS.map((d,i)=>({day:d,emoji:WEMOJI[i],val:Math.floor(rand()*60+30),lbl:rand()>.6?"길":rand()>.4?"중":"소"}));
  const lotto=genLotto(rand);
  return{oheng,dom,weak,lucky,sc,week,lotto,sj,weakName:weak.name.replace(/ .+/,"")};
}

/* ── Gemini 지수 백오프 ── */
async function fetchWithBackoff(body,maxRetries=3){
  let lastErr;
  for(let i=0;i<maxRetries;i++){
    try{
      const res=await fetch(GEMINI_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
      if(res.status===429){
        const w=Math.pow(2,i)*1500+Math.random()*500;
        console.warn('[429] '+(i+1)+'/'+maxRetries+' → '+Math.round(w/1000)+'초 대기');
        await new Promise(r=>setTimeout(r,w));
        lastErr=new Error('HTTP_429');continue;
      }
      return res;
    }catch(e){
      lastErr=e;
      if(i<maxRetries-1)await new Promise(r=>setTimeout(r,Math.pow(2,i)*1000));
    }
  }
  throw lastErr||new Error('NETWORK_ERROR');
}

    '연주: '+(sj.ySaju||'미상'),
    '월지: '+(sj.mJi||'미상'),
    '일주: '+(sj.dGan||'')+(sj.dJi||'')+'일주',
    '시지: '+(sj.hJi||'미상'),
    '주도 오행: '+domName,
    '용신 후보(약한 오행): '+weakName,
    '',
    '[분석 필수 항목]',
    '1. 격국(格局): 일주×월지 정격/변격 판단',
    '2. 신강/신약: 일간 세력 판단 후 억부용신 적용',

    '4. MBTI '+(f.mbti||'')+' × 사주 교차 분석',
    '5. 고민 "'+( CONCERN_KR[f.concern]||'')+'" 에 대한 깊이 있는 전문 조언 (가장 상세히)',
    '6. 시기는 반드시 "X월~Y월" 형식으로 구체적 명시',
    '',
    '[출력 규칙]',
    '- 순수 JSON만 출력 (코드블록 금지)',
    '- 각 텍스트 필드 값은 마크다운 형식 사용 가능 (**굵게**, *기울기*, - 목록 등)',
    '- overall 400자 이상, 각 항목 250자 이상의 전문적 내용',
    '- 뻔한 일반론 금지, 일주·월지 상호작용 반드시 언급',
    '- 따뜻하고 공감되는 언어 사용 (대전 특색 반영 가능)',
    '- lotto: 1~45 중복 없는 정수 6개씩 5세트, 사주 오행 기반 생성',
    '',
    '[응답 JSON 구조]',
    '{"overall":"...","wealthDeep":"...","loveDeep":"...","careerDeep":"...","healthDeep":"...","habitDeep":"...","mentorDeep":"...","studyDeep":"...","lotto":[[n,n,n,n,n,n],[n,n,n,n,n,n],[n,n,n,n,n,n],[n,n,n,n,n,n],[n,n,n,n,n,n]]}',
  ];

  const body={
    contents:[{parts:[{text:lines.join('\n')}]}],
    generationConfig:{temperature:0.85,topP:0.95,maxOutputTokens:4096},
  };

  const res=await fetchWithBackoff(body,3);
  if(!res.ok){
    const status=res.status;
    const msg=await res.text().catch(()=>'');
    console.error('[Gemini HTTP '+status+']',msg.slice(0,300));
    throw new Error('HTTP_'+status);
  }
  const data=await res.json();
  const raw=(data?.candidates?.[0]?.content?.parts?.[0]?.text)||'';
  if(!raw){console.error('[빈 응답]',JSON.stringify(data).slice(0,400));throw new Error('EMPTY_RESPONSE');}
  console.log('[Gemini 원본]',raw.slice(0,200));

  /* JSON 추출 파이프라인 */
  let c=raw.replace(/```json/gi,'').replace(/```/g,'').trim();
  const s=c.indexOf('{'),e=c.lastIndexOf('}');
  if(s<0||e<=s){console.error('[JSON 없음]',c.slice(0,200));throw new Error('JSON_NOT_FOUND');}
  c=c.slice(s,e+1);
  /* 문자열 값 내부 실제 개행 → \\n */
  c=c.replace(/"((?:[^"\\]|\\.)*)"/g,(m,v)=>'"'+v.replace(/\r?\n/g,'\\n')+'"');
  /* 제어문자 제거 */
  c=c.replace(/[\x00-\x08\x0b\x0c\x0e-\x1f]/g,'');
  let parsed;
  try{parsed=JSON.parse(c);}
  catch(pe){console.error('[파싱 실패]',pe.message,c.slice(0,300));throw new Error('PARSE_ERROR');}
  console.log('[Gemini 성공]',Object.keys(parsed).join(', '));
  return parsed;
}

function App(){
  const [form,setForm]=useState({name:'',chineseName:'',gender:'',birthdate:'',birthHour:'',city:'',mbti:'',concern:'',phone:'',email:'',agree:false});
  const [analyzing,setAnalyzing]=useState(false);
  const [report,setReport]=useState(null);
  const [errors,setErrors]=useState({});
  const [focused,setFocused]=useState(null);
  const [hoverC,setHoverC]=useState(null);
  const [shareOpen,setShareOpen]=useState(false);
  const resultAnchor=useRef(null);
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));

  /* 유효성 검사 */
  const validate=()=>{
    const e={};
    if(!form.name.trim())e.name=true;
    if(!form.gender)e.gender=true;
    if(!form.birthdate)e.birthdate=true;
    if(!form.birthHour)e.birthHour=true;
    if(!form.mbti)e.mbti=true;
    if(!form.concern)e.concern=true;
    setErrors(e);return Object.keys(e).length===0;
  };

  /* 웹훅 전송 */
  const sendWebhook=async(data,lotto)=>{
    const now=new Date();const pad=n=>String(n).padStart(2,'0');
    const dateStr=now.getFullYear()+'-'+pad(now.getMonth()+1)+'-'+pad(now.getDate())+' '+pad(now.getHours())+':'+pad(now.getMinutes());
    const lottoStr=lotto.map((s,i)=>'세트'+(i+1)+': '+s.join('-')).join(' | ');
    const payload={"날짜":dateStr,"이름":(data.name||'')+(data.chineseName?' ('+data.chineseName+')':''),"생년월일":data.birthdate||'',
      "태어난시간":data.birthHour||'',
      "성별":data.gender==='male'?'남성':data.gender==='female'?'여성':'',
      "태어난도시":data.city||'',"MBTI":data.mbti||'',
      "고민내용":CONCERN_KR[data.concern]||'',
      "추천로또번호":lottoStr,"유료결제여부":"Free","전화번호":data.phone||'',"이메일":data.email||''};
    try{await fetch(WEBHOOK,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});}
    catch(e){console.log('Webhook error:',e);}
  };

  /* 제출 */
  const handleSubmit=()=>{
    if(!validate())return;
    if(typeof gtag==='function'){
      gtag('event','saju_analysis_click',{mbti:form.mbti,concern:form.concern,agreed:form.agree});
      gtag('event','complete_saju_analysis',{mbti:form.mbti,concern:form.concern,gender:form.gender,birth_year:(form.birthdate||'').slice(0,4),agreed:form.agree});
    }
    setReport(null);setAnalyzing(true);
    runAnalysis();
  };

  const runAnalysis=useCallback(async()=>{
    const local=genLocalReport(form);
    try{
      const ai=await callGemini(form,local);
      /* 로또 검증 */
      let lotto=local.lotto;
      if(Array.isArray(ai.lotto)&&ai.lotto.length>=5){
        const valid=ai.lotto.slice(0,5).map(set=>{
          if(!Array.isArray(set))return null;
          const nums=set.map(Number).filter(n=>n>=1&&n<=45);
          const uniq=[...new Set(nums)];
          return uniq.length>=6?uniq.slice(0,6).sort((a,b)=>a-b):null;
        }).filter(Boolean);
        if(valid.length>=5)lotto=valid;
      }
      const merged={...local,lotto,
        overall:ai.overall||'',wealthDeep:ai.wealthDeep||'',loveDeep:ai.loveDeep||'',
        careerDeep:ai.careerDeep||'',healthDeep:ai.healthDeep||'',habitDeep:ai.habitDeep||'',
        mentorDeep:ai.mentorDeep||'',studyDeep:ai.studyDeep||'',
        aiPowered:true,apiError:false};
      setAnalyzing(false);setReport(merged);
      if(form.agree)sendWebhook(form,merged.lotto);
      setTimeout(()=>resultAnchor.current?.scrollIntoView({behavior:'smooth',block:'start'}),200);
    }catch(err){
      const errCode=err.message||'UNKNOWN';
      console.error('[분석 오류]',errCode,err);
      setAnalyzing(false);
      setReport({...local,aiPowered:false,apiError:true,errCode});
      if(form.agree)sendWebhook(form,local.lotto);
      setTimeout(()=>resultAnchor.current?.scrollIntoView({behavior:'smooth',block:'start'}),200);
    }
  },[form]);

  const handleReset=()=>{
    setReport(null);
    setForm({name:'',chineseName:'',gender:'',birthdate:'',birthHour:'',city:'',mbti:'',concern:'',phone:'',email:'',agree:false});
    window.scrollTo({top:0,behavior:'smooth'});
  };

  /* 인풋 스타일 */
  const inp=k=>({width:'100%',padding:'12px 14px',borderRadius:12,fontSize:'.86rem',
    background:focused===k?'rgba(139,92,246,.1)':'rgba(255,255,255,.04)',
    border:`1px solid ${errors[k]?'rgba(248,113,113,.6)':focused===k?'rgba(167,139,250,.6)':'rgba(255,255,255,.1)'}`,
    color:'#e2d9f3',outline:'none',transition:'all .3s',fontFamily:'inherit',
    boxShadow:focused===k?'0 0 0 3px rgba(139,92,246,.15)':'none'});
  const lbl={color:'#a78bfa',fontSize:'.7rem',letterSpacing:'.12em',textTransform:'uppercase',fontWeight:600,marginBottom:7,display:'block'};
  const sec={background:'rgba(255,255,255,.02)',border:'1px solid rgba(255,255,255,.07)',borderRadius:18,padding:20,marginBottom:12};

      <StarField/>
      <div style={{position:'fixed',inset:0,pointerEvents:'none',background:'radial-gradient(ellipse 60% 50% at 15% 10%,rgba(139,92,246,.1),transparent)',zIndex:0}}/>
      <div style={{position:'fixed',inset:0,pointerEvents:'none',background:'radial-gradient(ellipse 50% 60% at 85% 90%,rgba(59,130,246,.08),transparent)',zIndex:0}}/>

      <div style={{position:'relative',zIndex:1,maxWidth:480,margin:'0 auto',padding:'0 16px 40px'}}>

                <div style={{display:'flex',gap:10}}>
                  <div style={{flex:1}}>
                    <input placeholder="홍길동" value={form.name} onChange={e=>set('name',e.target.value)} onFocus={()=>setFocused('name')} onBlur={()=>setFocused(null)} style={inp('name')}/>
                    {errors.name&&<p style={{color:'rgba(248,113,113,.8)',fontSize:'.67rem',marginTop:4}}>이름을 입력해 주세요</p>}
                    <span style={{color:'rgba(167,139,250,.35)',fontSize:'.62rem',marginLeft:4}}>한글 이름</span>
                  </div>
                  <div style={{flex:1}}>
                    <input placeholder="洪吉童 (선택)" value={form.chineseName} onChange={e=>set('chineseName',e.target.value)} onFocus={()=>setFocused('cn')} onBlur={()=>setFocused(null)} style={inp('cn')}/>
                    <span style={{color:'rgba(167,139,250,.35)',fontSize:'.62rem',marginLeft:4}}>한자 이름</span>
                  </div>
                </div>
              </div>
              <div>
                <label style={lbl}>성별 *</label>
                <div style={{display:'flex',gap:8}}>
                  {[{v:'male',l:'남성 ♂',c:'#60a5fa'},{v:'female',l:'여성 ♀',c:'#f472b6'}].map(g=>(
                    <button key={g.v} onClick={()=>set('gender',g.v)} style={{flex:1,padding:11,borderRadius:12,fontSize:'.84rem',fontWeight:500,cursor:'pointer',transition:'all .3s',border:form.gender===g.v?`1px solid ${g.c}`:'1px solid rgba(255,255,255,.08)',background:form.gender===g.v?`${g.c}18`:'rgba(255,255,255,.02)',color:form.gender===g.v?g.c:'rgba(167,139,250,.55)',boxShadow:form.gender===g.v?`0 0 16px ${g.c}33`:'none'}}>{g.l}</button>
                  ))}
                </div>
                {errors.gender&&<p style={{color:'rgba(248,113,113,.8)',fontSize:'.67rem',marginTop:4}}>성별을 선택해 주세요</p>}
              </div>
            </div>

            {/* 생년월일 + 시간 + 도시 */}
            <div style={sec}>
              <div style={{marginBottom:16}}>
                <label style={lbl}>생년월일 *</label>
                <input type="date" value={form.birthdate} onChange={e=>set('birthdate',e.target.value)} onFocus={()=>setFocused('bd')} onBlur={()=>setFocused(null)} style={{...inp('bd'),colorScheme:'dark'}}/>
                {errors.birthdate&&<p style={{color:'rgba(248,113,113,.8)',fontSize:'.67rem',marginTop:4}}>생년월일을 입력해 주세요</p>}
              </div>
              <div style={{marginBottom:16}}>
                <label style={lbl}>태어난 시간 *</label>
                <div style={{position:'relative'}}>
                  <select value={form.birthHour} onChange={e=>set('birthHour',e.target.value)} onFocus={()=>setFocused('bh')} onBlur={()=>setFocused(null)} style={{...inp('bh'),paddingRight:36,cursor:'pointer'}}>
                    <option value="">시간 선택</option>
                    {HOURS_LIST.map(h=><option key={h} value={h}>{h}</option>)}
                  </select>
                  <svg style={{position:'absolute',right:12,top:'50%',transform:'translateY(-50%)',pointerEvents:'none'}} width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M4 6l4 4 4-4" stroke="rgba(167,139,250,.45)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
                </div>
                {errors.birthHour&&<p style={{color:'rgba(248,113,113,.8)',fontSize:'.67rem',marginTop:4}}>태어난 시간을 선택해 주세요</p>}
              </div>
              <div>
                <label style={lbl}>태어난 도시 <span style={{color:'rgba(167,139,250,.4)',fontSize:'.6rem',textTransform:'none'}}>(선택)</span></label>
                <div style={{position:'relative'}}>
                  <select value={form.city} onChange={e=>set('city',e.target.value)} onFocus={()=>setFocused('ct')} onBlur={()=>setFocused(null)} style={{...inp('ct'),paddingRight:36,cursor:'pointer'}}>
                    {CITIES.map(c=>(
                      <option key={c} value={CITY_DISABLED.has(c)?'':c} disabled={CITY_DISABLED.has(c)} style={{color:CITY_DISABLED.has(c)?'rgba(167,139,250,.4)':'#e2d9f3',fontWeight:CITY_DISABLED.has(c)?600:'normal'}}>{c}</option>
                    ))}
                  </select>
                  <svg style={{position:'absolute',right:12,top:'50%',transform:'translateY(-50%)',pointerEvents:'none'}} width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M4 6l4 4 4-4" stroke="rgba(167,139,250,.45)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
                </div>
                <p style={{color:'rgba(167,139,250,.3)',fontSize:'.62rem',marginTop:4}}>✦ 출생 도시는 더 정밀한 사주 분석에 활용됩니다.</p>
              </div>
            </div>

            {/* MBTI */}
            <div style={sec}>
              <label style={lbl}>MBTI 유형 *</label>
              <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:6}}>
                {MBTI_LIST.map(type=>(
                  <button key={type} onClick={()=>set('mbti',type)} style={{padding:'9px 4px',borderRadius:10,fontSize:'.76rem',fontWeight:700,cursor:'pointer',transition:'all .2s',border:form.mbti===type?'1px solid rgba(167,139,250,.75)':'1px solid rgba(255,255,255,.07)',background:form.mbti===type?'linear-gradient(135deg,rgba(139,92,246,.3),rgba(99,102,241,.2))':'rgba(255,255,255,.025)',color:form.mbti===type?'#e2d9f3':'rgba(167,139,250,.45)',boxShadow:form.mbti===type?'0 0 10px rgba(139,92,246,.3)':'none'}}>
                    {type}
                  </button>
                ))}
              </div>
              {errors.mbti&&<p style={{color:'rgba(248,113,113,.8)',fontSize:'.67rem',marginTop:6}}>MBTI를 선택해 주세요</p>}
            </div>

            {/* 고민 6개 */}
            <div style={sec}>
              <label style={lbl}>현재 가장 큰 고민 *</label>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
                {CONCERNS.map(c=>(
                  <button key={c.id} onClick={()=>set('concern',c.id)} onMouseEnter={()=>setHoverC(c.id)} onMouseLeave={()=>setHoverC(null)} style={{padding:'14px 12px',borderRadius:14,textAlign:'left',cursor:'pointer',transition:'all .3s',border:form.concern===c.id?'1px solid rgba(167,139,250,.55)':hoverC===c.id?'1px solid rgba(167,139,250,.18)':'1px solid rgba(255,255,255,.05)',background:form.concern===c.id?'linear-gradient(135deg,rgba(139,92,246,.2),rgba(99,102,241,.13))':hoverC===c.id?'rgba(139,92,246,.05)':'rgba(255,255,255,.015)',boxShadow:form.concern===c.id?'0 0 20px rgba(139,92,246,.22)':'none',transform:hoverC===c.id&&form.concern!==c.id?'translateY(-2px)':'none'}}>
                    <div style={{fontSize:'1.25rem',marginBottom:4}}>{c.icon}</div>
                    <div style={{color:form.concern===c.id?'#e2d9f3':'rgba(167,139,250,.65)',fontWeight:600,fontSize:'.8rem',marginBottom:2}}>{c.label}</div>
                    <div style={{color:'rgba(147,197,253,.4)',fontSize:'.65rem'}}>{c.desc}</div>
                  </button>
                ))}
              </div>
              {errors.concern&&<p style={{color:'rgba(248,113,113,.8)',fontSize:'.67rem',marginTop:6}}>고민 유형을 선택해 주세요</p>}
            </div>

            {/* 연락처 + 개인정보 */}
            <div style={sec}>
              <label style={lbl}>연락처 정보 (선택)</label>
              <div style={{marginBottom:10}}>
                <input type="email" placeholder="이메일 (결과 수신용)" value={form.email} onChange={e=>set('email',e.target.value)} onFocus={()=>setFocused('em')} onBlur={()=>setFocused(null)} style={inp('em')}/>
              </div>
              <input type="tel" placeholder="전화번호 (선택)" value={form.phone} onChange={e=>set('phone',e.target.value)} onFocus={()=>setFocused('ph')} onBlur={()=>setFocused(null)} style={inp('ph')}/>

              {/* 개인정보 동의 */}
              <label onClick={()=>set('agree',!form.agree)} style={{display:'flex',alignItems:'flex-start',gap:10,marginTop:14,cursor:'pointer',padding:'12px 14px',borderRadius:12,background:'rgba(139,92,246,.05)',border:`1px solid ${form.agree?'rgba(167,139,250,.45)':'rgba(255,255,255,.08)'}`}}>
                <div style={{width:18,height:18,borderRadius:5,border:`2px solid ${form.agree?'#a78bfa':'rgba(167,139,250,.3)'}`,background:form.agree?'rgba(139,92,246,.35)':'transparent',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,marginTop:2,transition:'all .2s',cursor:'pointer'}}>
                  {form.agree&&<span style={{color:'#a78bfa',fontSize:'.72rem',fontWeight:700}}>✓</span>}
                </div>
                <span style={{color:'rgba(167,139,250,.7)',fontSize:'.72rem',lineHeight:'1.75'}}>
                  <strong style={{color:form.agree?'#c4b5fd':'rgba(167,139,250,.85)',fontSize:'.76rem'}}>개인정보 수집 및 이용에 동의합니다</strong>
                  <span style={{color:'rgba(167,139,250,.45)',marginLeft:4}}>(선택)</span><br/>
                  <span style={{fontSize:'.64rem',color:'rgba(167,139,250,.4)',lineHeight:'1.8'}}>
                    수집: 성별, 생년월일, MBTI, 고민내용<br/>
                    목적: 맞춤형 사주 분석 결과 제공<br/>
                    보유: 분석 완료 후 즉시 파기 원칙
                  </span>
                  {form.agree&&<span style={{display:'block',marginTop:5,color:'rgba(74,222,128,.75)',fontSize:'.63rem'}}>✓ 동의하셨습니다. 분석 결과가 안전하게 저장됩니다.</span>}
                  {!form.agree&&<span style={{display:'block',marginTop:5,color:'rgba(167,139,250,.35)',fontSize:'.62rem'}}>미체크 시 분석은 정상 진행되나 결과가 저장되지 않습니다.</span>}
                </span>
              </label>
            </div>

            {/* 🔒 보안 약속 */}
            <div style={{borderRadius:16,padding:'16px 18px',marginBottom:16,background:'linear-gradient(135deg,rgba(16,30,60,.85),rgba(10,20,50,.8))',border:'1px solid rgba(96,165,250,.25)',boxShadow:'0 0 20px rgba(59,130,246,.07)'}}>
              <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12}}>
                <span style={{fontSize:'1.05rem'}}>🔒</span>
                <span style={{color:'#93c5fd',fontSize:'.76rem',fontWeight:700,letterSpacing:'.08em'}}>아우름사주의 보안 약속</span>
              </div>
              <div style={{display:'flex',flexDirection:'column',gap:9}}>
                {[
                  {icon:'🕵️',title:'익명성 보장',desc:'성함이나 연락처를 수집하지 않아 개인을 특정할 수 없습니다.'},
                  {icon:'🚫',title:'목적 외 사용 금지',desc:"입력하신 정보는 오직 '사주 분석'에만 사용되며 외부 유출이 절대 없습니다."},
                  {icon:'🗑️',title:'데이터 즉시 파기',desc:'무료 테스트 기간 중 수집된 정보는 결과 전달 후 안전하게 삭제됩니다.'},
                ].map((item,i)=>(
                  <div key={i} style={{display:'flex',alignItems:'flex-start',gap:10}}>
                    <span style={{fontSize:'.9rem',flexShrink:0,marginTop:1}}>{item.icon}</span>
                    <p style={{fontSize:'.7rem',lineHeight:'1.75',color:'rgba(191,219,254,.7)'}}>
                      <strong style={{color:'rgba(147,197,253,.9)',fontWeight:600}}>{item.title}:</strong>{' '}{item.desc}
                    </p>
                  </div>
                ))}
              </div>
            </div>

            {/* 제출 버튼 */}
            <button onClick={handleSubmit} className="neo-glow" style={{width:'100%',padding:18,borderRadius:16,fontSize:'1.05rem',fontWeight:600,fontFamily:"'Noto Serif KR',serif",letterSpacing:'.14em',color:'#fff',border:'1px solid rgba(255,255,255,.12)',cursor:'pointer',background:'linear-gradient(135deg,#7c3aed,#4f46e5 40%,#2563eb 80%,#7c3aed)',backgroundSize:'200% auto',display:'flex',alignItems:'center',justifyContent:'center',gap:10,marginBottom:32}}>
              <span style={{fontSize:'1.1rem'}}>✨</span>
              나의 사주 분석하기
              <span style={{fontSize:'1.1rem'}}>✨</span>
            </button>
          </div>
        )}

        {/* ─── 결과 ─── */}
        {report&&(
          <>
            <div ref={resultAnchor} style={{height:1}}/>
            <div style={{display:'flex',alignItems:'center',gap:12,margin:'4px 0 20px'}}>
              <div style={{flex:1,height:1,background:'linear-gradient(to right,transparent,rgba(167,139,250,.4))'}}/>
              <div style={{display:'flex',alignItems:'center',gap:6,padding:'7px 16px',borderRadius:99,background:'rgba(139,92,246,.15)',border:'1px solid rgba(167,139,250,.25)'}}>
                <span style={{color:'#fbbf24',fontSize:'.7rem'}}>★</span>
                <span style={{color:'#a78bfa',fontSize:'.65rem',letterSpacing:'.15em',fontWeight:700}}>ANALYSIS REPORT 2026</span>
                <span style={{color:'#fbbf24',fontSize:'.7rem'}}>★</span>
              </div>
              <div style={{flex:1,height:1,background:'linear-gradient(to left,transparent,rgba(167,139,250,.4))'}}/>
            </div>
            <ReportSection data={report} form={form} onShare={()=>setShareOpen(true)}/>
            <button onClick={handleReset} style={{width:'100%',padding:14,borderRadius:14,background:'rgba(255,255,255,.025)',border:'1px solid rgba(167,139,250,.18)',color:'rgba(167,139,250,.65)',fontSize:'.8rem',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:6,marginBottom:20}}>
              ↺ 처음부터 다시 분석하기
            </button>
          </>
        )}

        {/* ─── 푸터 ─── */}
        <div style={{textAlign:'center',paddingTop:16,paddingBottom:20,borderTop:'1px solid rgba(255,255,255,.04)'}}>
          <p style={{color:'rgba(167,139,250,.18)',fontSize:'.6rem',letterSpacing:'.08em'}}>
            © 2026 아우름사주 × AI SAJU MASTER · Powered by Gemini AI & 명리학<br/>
            All rights reserved · mysajumaster.com
          </p>
        </div>
      </div>

      {analyzing&&<Analyzing/>}
      {shareOpen&&report&&<ShareModal report={report} form={form} onClose={()=>setShareOpen(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
