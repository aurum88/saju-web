<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>대전 사주 명리관 - Gemini AI</title>
    <style>
        /* 대표님의 깔끔한 디자인 유지 */
        body { font-family: 'Noto Sans KR', sans-serif; background: #f4f7f6; display: flex; justify-content: center; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        input, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        button { background: #e74c3c; color: white; border: none; font-weight: bold; cursor: pointer; }
        #result { margin-top: 20px; white-space: pre-wrap; line-height: 1.6; background: #fff8f8; padding: 15px; border-radius: 8px; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🔮 대전 사주 명리관 (AI)</h2>
        <input type="text" id="userName" placeholder="이름 입력">
        <input type="date" id="birthDate">
        <button onclick="getSaju()">AI 사주 분석 시작</button>
        <div id="result"></div>
    </div>

    <script>
        // 1. 깃허브 액션이 치환할 자리 (언더바 포함하여 정확히 설정)
        const API_KEY = 'GEMINI_API_KEY_PLACEHOLDER';

        async function getSaju() {
            const resultDiv = document.getElementById('result');
            const name = document.getElementById('userName').value;
            const birth = document.getElementById('birthDate').value;

            if(!name || !birth) return alert("정보를 입력해주세요!");

            resultDiv.style.display = "block";
            resultDiv.innerText = "✨ 대전의 기운을 모아 분석 중...";

            // 2. 가장 안정적인 구글 v1beta 공식 엔드포인트
            const URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

            try {
                const response = await fetch(URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `${name}(${birth})의 사주를 대전 명리관 스타일로 분석해줘.` }] }]
                    })
                });

                const data = await response.json();
                
                if (data.error) {
                    throw new Error(data.error.message);
                }

                resultDiv.innerText = data.candidates[0].content.parts[0].text;
            } catch (err) {
                resultDiv.innerText = "❌ 오류 발생: " + err.message + "\n(키 치환 여부를 확인해주세요)";
            }
        }
    </script>
</body>
</html>
