/* ── SEED RANDOM ── */
function srand(seed){let s=seed;return()=>{s=(s*9301+49297)%233280;return s/233280;};}
function gseed(f){const str=(f.name||'가')+(f.birthdate||'2000')+(f.mbti||'INFP')+(f.concern||'wealth');return str.split('').reduce((a,c)=>a+c.charCodeAt(0),0);}

/* ── LOTTO GENERATOR ── */
function genLotto(rand){
  const sets=[];
  for(let s=0;s<5;s++){
    const pool=new Set();
    while(pool.size<6)pool.add(Math.floor(rand()*45)+1);
    sets.push([...pool].sort((a,b)=>a-b));
  }
  return sets;
}

/* ── REPORT GENERATOR ── */
function genReport(f){
  const rand=srand(gseed(f));
  const oheng=OHENG.map(o=>({...o,pct:Math.floor(rand()*40+10)}));
  const tot=oheng.reduce((s,o)=>s+o.pct,0);
  oheng.forEach(o=>o.pct=Math.round(o.pct/tot*100));
  const wealth=Math.floor(rand()*28+60),love=Math.floor(rand()*28+55),career=Math.floor(rand()*28+62),health=Math.floor(rand()*28+58),mentor=Math.floor(rand()*28+56),study=Math.floor(rand()*28+57);

  const dom=oheng.reduce((a,b)=>a.pct>b.pct?a:b);

  const luckMap={
    "목 木":{color:"초록·에메랄드",hex:"#4ade80",item:"나무 소재 액세서리",fashion:"자연 소재 그린 & 베이지 톤",gem:"에메랄드·비취",food:"녹차·브로콜리·아보카도",place:"공원·숲·식물원",number:"3, 8"},
    "화 火":{color:"레드·오렌지·핑크",hex:"#f87171",item:"루비 반지·산호석",fashion:"붉은 포인트 컬러 V넥",gem:"루비·가넷",food:"고추·토마토·석류",place:"카페·남향 공간·야외 테라스",number:"2, 7"},
    "토 土":{color:"황토·아이보리·골드",hex:"#fbbf24",item:"황동 열쇠고리·황토 도자기",fashion:"어스톤 레이어드 룩",gem:"시트린·호안석",food:"고구마·된장·황금 키위",place:"박물관·고즈넉한 카페·전통 한옥",number:"5, 0"},
    "금 金":{color:"화이트·실버·아이스블루",hex:"#c0cfe8",item:"실버 체인 목걸이·백수정",fashion:"모노크롬 화이트 메탈릭",gem:"다이아몬드·백수정",food:"배·흰쌀·두부·우유",place:"미술관·도서관·고급 호텔 라운지",number:"4, 9"},

  const overallTpl=`올해 ${f.name||'고객님'}님은 ${dom.emoji}${dom.name}의 기운이 지배하는 가운데, ${f.mbti||'INFP'}의 타고난 ${traits[f.mbti]||'독특한 개성'}이 만개하는 특별한 해입니다. 사주의 일주(日柱)는 준비해온 것들이 서서히 결실을 맺기 시작하는 시점을 가리키며, 상반기는 내실을 다지고 하반기는 외부로 뻗어나가는 확장의 기운이 강해집니다. 주변의 기대보다 자신의 속도와 방향을 신뢰하는 것이 이 해의 가장 중요한 덕목이며, 꾸준함과 집중력이 기대 이상의 결과를 가져다줄 것입니다. 타고난 ${traits[f.mbti]||'독특한 개성'}이 주변 사람들의 마음을 움직이는 강력한 자산이 되는 해이므로, 자신의 가치관을 세상에 선명하게 드러내는 용기가 가장 큰 행운의 열쇠입니다. 전반적으로 2026년은 당신이 가장 빛나는 해이며, ${dom.emoji}${dom.name}의 기운이 모든 선택에 든든한 배경이 되어줄 것입니다.`;

  const wealthTpl=`재물의 흐름은 ${dom.emoji}${dom.name} 기운의 영향으로 초반 소폭 조정 후 중반부터 강한 상승 곡선을 그립니다. 재물의 귀인은 10년 이상 경험을 가진 안정적인 직종의 연상이거나, 해외 경험이 풍부한 전문직 종사자 타입으로 가벼운 대화에서 뜻밖의 기회가 열립니다. 3월~5월 사이에 오는 재물 기회를 놓치지 마세요—이 시기에 중요한 재무 결정을 내리거나 새로운 수입 채널을 론칭하는 것을 권장합니다. 재테크 전략으로는 단기 변동성보다 3~5년 이상의 적립식 투자 또는 배당 중심 포트폴리오가 이 해의 기운과 잘 맞으며, 자신의 재능을 상품화하는 '지식 경제' 방식이 가장 높은 수익률을 가져옵니다. 행운의 숫자 ${lucky.number}을 활용한 투자 타이밍 설정과 ${lucky.color} 계열의 지갑 또는 카드 케이스 사용이 재물운을 높이는 실천법입니다.`;

  const loveTpl=`올해 대인관계의 키워드는 '진정성'과 '타이밍'으로, 억지로 관계를 만들기보다 자신의 에너지가 높을 때 자연스럽게 흘러가도록 두는 것이 가장 강력한 전략입니다. 이미 연애 중이라면 상반기에 작은 갈등이 있을 수 있으나 이는 관계를 더 깊은 차원으로 끌어올리는 정화의 과정이며 솔직한 대화가 모든 것을 해결합니다. 새로운 인연은 학습·세미나·온라인 커뮤니티 등 지적 호기심을 공유하는 공간에서 만날 확률이 높으며, 5월과 9월에 인연 피크가 찾아옵니다. 비즈니스 파트너십에서는 ${traits[f.mbti]||'당신의 강점'}이 상대방을 안심시키고 신뢰를 구축하는 핵심 자산이 되므로, 처음 만나는 자리에서 자신의 가치관과 비전을 명확히 전달하세요. 관계에서 받기만 하지 않고 먼저 베푸는 자세가 올해 최고의 애정운을 부르는 비밀 공식입니다.`;

  const habitTpl=`${dom.emoji}${dom.name}의 기운을 극대화하는 행운의 장소는 ${lucky.place}이며, 중요한 결정이나 미팅 전날 이곳을 방문하면 운세가 상승합니다. 아침 루틴으로는 기상 후 15분 이내에 미지근한 물 한 잔을 마시고 창을 열어 자연광을 받는 것이 하루의 기운을 열어주는 첫 번째 개운법입니다. 행운의 음식인 ${lucky.food}을 주 3회 이상 섭취하면 체내 기운의 균형이 맞춰져 전반적인 운세 흐름이 부드러워집니다. 취침 전 디지털 기기를 30분 이상 멀리하고 오늘 감사한 세 가지를 저널링하는 습관이 숙면과 다음 날 운세를 높이는 가장 간단하고 강력한 방법입니다. ${lucky.gem}을 몸에 지니거나 책상 위에 두면 ${dom.name}의 기운이 증폭되어 집중력과 판단력이 향상됩니다.`;

  const careerTpl=`올해 커리어 운세는 ${dom.emoji}${dom.name}의 강력한 기운 아래 상승 궤도에 진입합니다. ${traits[f.mbti]||'당신의 강점'}을 가진 당신은 이 해에 특히 리더십과 전문성이 주목받는 프로젝트에서 두각을 나타낼 가능성이 높습니다. 상반기에는 기존 역량을 갈고닦는 준비 시기이며, 하반기에는 그 결과물이 외부로 인정받는 상승기가 찾아옵니다. 이직·창업·승진 등 중요한 커리어 결정은 7~9월 사이의 기운이 가장 강하므로 이 시기를 적극 활용하세요. 주변의 귀인 중 당신보다 한 단계 위의 멘토 타입을 가까이 두면 커리어 가속도가 붙습니다. 지금 준비하는 일이 결실을 맺는 해이니 포기하지 말고 꾸준히 나아가세요.`;

  const healthTpl=`올해 건강운은 ${dom.emoji}${dom.name}의 기운과 함께 체력 재충전의 사이클에 진입합니다. 이른 아침 루틴을 강화하고 행운의 음식인 ${lucky.food}을 꾸준히 섭취하면 체내 기운의 균형이 맞춰집니다. 상반기에는 피로 관리와 소화기 건강에 특별히 주의를 기울이고, 하반기에는 체력이 상승하는 에너지 전환점이 찾아옵니다. 정기 건강검진과 충분한 수면(7~8시간)이 올해 건강운을 유지하는 핵심 습관입니다. ${lucky.gem}을 몸에 지니면 ${dom.name}의 치유 기운이 활성화되어 면역력 강화에 도움이 됩니다. 마음의 건강을 위해 감사 일기와 명상 루틴을 추가하면 2026년 내내 활력이 넘칩니다.`;

  const mentorTpl=`올해 귀인·인복은 특별히 강한 흐름을 보입니다. ${dom.emoji}${dom.name}의 기운은 좋은 사람들을 끌어당기는 자력이 있으며, 예상치 못한 조력자가 인생의 결정적 순간에 나타날 것입니다. 귀인의 타입은 조용하지만 영향력 있는 인물로, 직접적인 도움보다 핵심 정보와 연결을 제공하는 방식으로 기여합니다. 새로운 모임이나 커뮤니티에 적극 참여하되, 표면적인 네트워킹보다 깊은 관심사를 공유하는 소수와의 연결에 집중하세요. 기존 관계에서도 오랫동안 소홀히 했던 분들께 먼저 연락하면 예상치 못한 귀인 효과가 발동합니다. 인복을 키우는 핵심은 자신이 먼저 누군가의 귀인이 되어주는 것임을 기억하세요.`;

  const studyTpl=`올해 학업·시험운은 ${dom.emoji}${dom.name}의 집중력 기운이 강하게 뒷받침합니다. ${traits[f.mbti]||'당신의 강점'}의 특성상 깊이 있는 집중력이 발휘되는 시기이며, 특히 전문 자격증이나 고급 학위 과정에서 탁월한 성과를 낼 수 있습니다. 시험 준비는 오전 6~9시와 오후 9~11시의 집중력 골든타임을 적극 활용하세요. 행운의 공부 장소인 ${lucky.place}를 학습 공간으로 활용하면 집중력과 기억력이 배가됩니다. 합격 기운의 피크는 3월과 9월이므로 이 시기에 맞춰 중요한 시험을 준비하는 것을 권장합니다. 행운 숫자 ${lucky.number}을 시험 당일 활용하면 긍정적인 에너지를 끌어올릴 수 있습니다.`;

  return{oheng,wealth,love,career,health,mentor,study,week,lotto,dom,lucky,trait:traits[f.mbti]||"독특한 개성",overall:overallTpl,wealthDeep:wealthTpl,loveDeep:loveTpl,habitDeep:habitTpl,careerDeep:careerTpl,healthDeep:healthTpl,mentorDeep:mentorTpl,studyDeep:studyTpl};
}

/* ── STAR FIELD (별똥별 없음 — 초창기 스타일 그대로) ── */
function StarField(){
  const stars=useRef(Array.from({length:70},(_,i)=>({id:i,x:Math.random()*100,y:Math.random()*100,sz:Math.random()*2+.5,delay:Math.random()*4,op:Math.random()*.7+.1,dur:Math.random()*3+2}))).current;
  return(
    <div style={{position:'fixed',inset:0,pointerEvents:'none',overflow:'hidden',zIndex:0}}>
      {stars.map(s=><div key={s.id} style={{position:'absolute',left:`${s.x}%`,top:`${s.y}%`,width:s.sz,height:s.sz,background:'white',borderRadius:'50%',opacity:s.op,animation:`twinkle ${s.dur}s ease-in-out infinite ${s.delay}s`}}/>)}
    </div>
  );
}

/* ── CIRCULAR GAUGE ── */
function CG({value,label,icon,color,delay=0}){
  const [anim,setAnim]=useState(0);
  const r=36,cx=42,cy=42,circ=2*Math.PI*r,dash=(anim/100)*circ;
  useEffect(()=>{const t=setTimeout(()=>{let st=null;const step=(ts)=>{if(!st)st=ts;const p=Math.min((ts-st)/1200,1);setAnim(Math.floor(p*value));if(p<1)requestAnimationFrame(step);};requestAnimationFrame(step);},delay);return()=>clearTimeout(t);},[value,delay]);
  return(
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:'6px'}}>
      <div style={{position:'relative'}}>
        <svg width="84" height="84" style={{transform:'rotate(-90deg)'}}>
          <circle cx={cx} cy={cy} r={r} fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth="6"/>
          <circle cx={cx} cy={cy} r={r} fill="none" stroke={color} strokeWidth="6" strokeDasharray={`${dash} ${circ}`} strokeLinecap="round" style={{filter:`drop-shadow(0 0 7px ${color})`}}/>
        </svg>
        <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}}>
          <span style={{fontSize:'0.95rem'}}>{icon}</span>
          <span style={{color:'#e2d9f3',fontSize:'0.9rem',fontWeight:700}}>{anim}<span style={{fontSize:'0.5rem'}}>%</span></span>
        </div>
      </div>
      <span style={{color:'rgba(167,139,250,0.8)',fontSize:'0.65rem',letterSpacing:'0.06em'}}>{label}</span>
    </div>
  );
}

/* ── OHENG BAR ── */
function OBar({item,delay}){
  const [w,setW]=useState(0);
  useEffect(()=>{const t=setTimeout(()=>setW(item.pct),delay);return()=>clearTimeout(t);},[item.pct,delay]);
  return(
    <div style={{marginBottom:'10px'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'5px'}}>
        <span style={{color:item.color,fontSize:'0.76rem',fontWeight:600,textShadow:`0 0 8px ${item.shadow}`}}>{item.emoji} {item.name}</span>
        <span style={{color:'rgba(226,217,243,0.5)',fontSize:'0.68rem'}}>{item.pct}%</span>
      </div>
      <div style={{height:'6px',background:'rgba(255,255,255,0.05)',borderRadius:'99px',overflow:'hidden'}}>
        <div style={{height:'100%',borderRadius:'99px',width:`${w}%`,background:`linear-gradient(90deg,${item.color}55,${item.color})`,boxShadow:`0 0 8px ${item.shadow}`,transition:`width 1.2s cubic-bezier(.4,0,.2,1) ${delay}ms`}}/>
      </div>
    </div>
  );
}

/* ── WEEK CHART ── */
function WeekChart({data}){
  const max=Math.max(...data.map(d=>d.val));
  const [shown,setShown]=useState(false);
  useEffect(()=>{const t=setTimeout(()=>setShown(true),400);return()=>clearTimeout(t);},[]);
  const lc={길:'#4ade80',중:'#fbbf24',소:'#f87171'};
  const W=290,H=58,P=14;
  const pts=data.map((d,i)=>({x:P+(i/(data.length-1))*(W-P*2),y:H-P-((d.val/max)*(H-P*2)),...d}));
  const pathD=pts.map((p,i)=>`${i===0?'M':'L'}${p.x},${p.y}`).join(' ');
  return(
    <div>
      <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{overflow:'visible'}}>
        <defs><linearGradient id="wg" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stopColor="#a78bfa"/><stop offset="50%" stopColor="#60a5fa"/><stop offset="100%" stopColor="#f472b6"/></linearGradient></defs>
        <path d={pathD} fill="none" stroke="url(#wg)" strokeWidth="2.2" style={{strokeDasharray:shown?'1000':'0',strokeDashoffset:shown?'0':'1000',transition:'stroke-dashoffset 1.8s ease',filter:'drop-shadow(0 0 4px rgba(167,139,250,0.5))'}}/>
        {pts.map((p,i)=><circle key={i} cx={p.x} cy={p.y} r="4" fill={lc[p.lbl]||'#a78bfa'} style={{filter:`drop-shadow(0 0 4px ${lc[p.lbl]})`,opacity:shown?1:0,transition:`opacity .4s ${.9+i*.1}s`}}/>)}
      </svg>
      <div style={{display:'flex',justifyContent:'space-between',marginTop:'6px'}}>
        {data.map((d,i)=>(
          <div key={i} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:'2px'}}>
            <span style={{fontSize:'0.7rem'}}>{d.emoji}</span>
            <span style={{color:'rgba(167,139,250,0.5)',fontSize:'0.58rem'}}>{d.day}</span>
            <span style={{fontSize:'0.55rem',color:lc[d.lbl],fontWeight:700}}>{d.lbl}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ── LOTTO BALLS ── */
function LottoBalls({sets}){
  const colors=['#fbbf24','#f97316','#ec4899','#8b5cf6','#06b6d4'];
  return(
    <div style={{display:'flex',flexDirection:'column',gap:'12px'}}>
      {sets.map((set,si)=>(
        <div key={si} style={{display:'flex',alignItems:'center',gap:'8px'}}>
          <span style={{color:colors[si],fontSize:'0.65rem',fontWeight:700,minWidth:'20px',letterSpacing:'0.05em'}}>{si+1}세트</span>
          <div style={{display:'flex',gap:'6px',flexWrap:'wrap'}}>
            {set.map((n,ni)=>(
              <div key={ni} className="lotto-ball" style={{width:'36px',height:'36px',borderRadius:'50%',background:`radial-gradient(circle at 35% 35%, ${colors[si]}ff, ${colors[si]}66)`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'0.75rem',fontWeight:800,color:'#fff',border:`2px solid ${colors[si]}`,animationDelay:`${si*.3+ni*.1}s`,flexShrink:0}}>

      ))}

  );
}

/* ── ACCORDION ── */
function Accordion({icon,title,children,open:defaultOpen=false,accent='#a78bfa'}){
  const [open,setOpen]=useState(defaultOpen);
  return(
    <div style={{borderRadius:'14px',border:`1px solid ${open?accent+'44':'rgba(255,255,255,0.07)'}`,background:open?`${accent}0a`:'rgba(255,255,255,0.02)',marginBottom:'10px',transition:'all .3s ease',overflow:'hidden'}}>
      <button onClick={()=>setOpen(o=>!o)} style={{width:'100%',display:'flex',alignItems:'center',justifyContent:'space-between',padding:'14px 16px',background:'none',border:'none',cursor:'pointer',outline:'none'}}>
        <div style={{display:'flex',alignItems:'center',gap:'10px'}}>
          <span style={{fontSize:'1rem'}}>{icon}</span>
          <span style={{color:open?accent:'rgba(226,217,243,0.75)',fontSize:'0.82rem',fontWeight:600,letterSpacing:'0.05em'}}>{title}</span>
        </div>
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" style={{color:accent,transform:open?'rotate(0)':'rotate(-90deg)',transition:'transform .3s'}}>
          <path d={open?"M3 6l5 5 5-5":"M6 3l5 5-5 5"} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      </button>
      <div className={`accordion-body ${open?'open':''}`}>
        <div style={{padding:'0 16px 16px',color:'rgba(209,213,219,0.85)',fontSize:'0.8rem',lineHeight:'1.95',borderTop:`1px solid ${accent}22`}}>
          <div style={{paddingTop:'12px'}}>{children}</div>
        </div>
      </div>
    </div>
  );
}

/* ── LOTTO COPY MODAL ── */
function LottoCopyModal({lotto,onClose}){
  const [copied,setCopied]=useState(false);
  const cols=['#fbbf24','#f97316','#ec4899','#8b5cf6','#06b6d4'];
  const txt=lotto.map((set,i)=>`세트${i+1}: ${set.join(' - ')}`).join('\n')+'\n\n📱 나도 분석받기 → '+window.location.href;
  const doCopy=()=>{
    const copy=(t)=>{if(navigator.clipboard?.writeText){navigator.clipboard.writeText(t);}else{const ta=document.createElement('textarea');ta.value=t;ta.style.cssText='position:fixed;opacity:0';document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);}};
    copy(txt);setCopied(true);setTimeout(()=>setCopied(false),2500);
  };
  const doShare=async()=>{if(navigator.share){try{await navigator.share({title:'추천 로또 번호',text:txt});}catch(e){}}else{doCopy();}};
  return(
    <div style={{position:'fixed',inset:0,zIndex:110,display:'flex',alignItems:'center',justifyContent:'center',padding:'16px',background:'rgba(5,5,20,0.93)',backdropFilter:'blur(8px)'}} onClick={onClose}>
      <div style={{maxWidth:'360px',width:'100%',borderRadius:'24px',padding:'24px',background:'linear-gradient(135deg,rgba(40,20,60,0.96),rgba(15,20,50,0.96))',border:'1px solid rgba(251,191,36,0.3)',boxShadow:'0 0 60px rgba(251,191,36,0.15)'}} onClick={e=>e.stopPropagation()}>
        <div style={{textAlign:'center',marginBottom:'16px'}}>
          <div style={{fontSize:'2rem',marginBottom:'6px'}}>🎰</div>
          <h3 style={{color:'#e2d9f3',fontFamily:"'Noto Serif KR',serif",fontSize:'1rem',marginBottom:'4px'}}>추천 로또 번호</h3>
          <p style={{color:'rgba(251,191,36,0.6)',fontSize:'0.7rem'}}>번호를 복사하거나 공유해보세요</p>
        </div>
        <div style={{padding:'14px',borderRadius:'12px',background:'rgba(255,255,255,0.04)',border:'1px solid rgba(251,191,36,0.15)',marginBottom:'14px'}}>
          {lotto.map((set,si)=>(
            <div key={si} style={{display:'flex',alignItems:'center',gap:'8px',marginBottom:si<4?'8px':'0'}}>
              <span style={{color:cols[si],fontSize:'0.65rem',fontWeight:700,minWidth:'36px'}}>세트{si+1}</span>
              <span style={{color:'#e2d9f3',fontSize:'0.82rem',letterSpacing:'0.08em'}}>{set.join(' - ')}</span>
            </div>
          ))}
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'8px',marginBottom:'8px'}}>
          <button onClick={doShare} style={{padding:'11px',borderRadius:'12px',background:'linear-gradient(135deg,#b45309,#d97706)',color:'#fff',border:'none',fontSize:'0.78rem',fontWeight:600,cursor:'pointer'}}>🔗 SNS 공유</button>
          <button onClick={doCopy} style={{padding:'11px',borderRadius:'12px',background:copied?'rgba(74,222,128,0.2)':'rgba(251,191,36,0.1)',color:copied?'#4ade80':'#fbbf24',border:`1px solid ${copied?'rgba(74,222,128,0.4)':'rgba(251,191,36,0.3)'}`,fontSize:'0.78rem',fontWeight:600,cursor:'pointer'}}>
            {copied?'✅ 복사 완료':'📋 번호 복사'}

/* ── ANALYZING OVERLAY (초창기 원본 스타일: 4겹 링 + 8개 궤도 파티클) ── */
function Analyzing({onDone}){
  const [phase,setPhase]=useState(0);
  const phases=["생년월일 데이터 로딩...","오행(五行) 기운 분석 중...","MBTI 성향 매핑 중...","운명의 실타래 해석 중...","로또 행운 번호 생성 중...","심층 리포트 완성 중...","분석 완료! ✨"];
  useEffect(()=>{const iv=setInterval(()=>setPhase(p=>{if(p>=phases.length-1){clearInterval(iv);setTimeout(onDone,450);return p;}return p+1;}),580);return()=>clearInterval(iv);},[]);
  const prog=Math.round((phase/(phases.length-1))*100);
  return(
    <div style={{position:'fixed',inset:0,zIndex:90,display:'flex',alignItems:'center',justifyContent:'center',background:'rgba(5,5,20,0.97)'}}>
      <div style={{textAlign:'center',padding:'0 32px'}}>
        <div style={{position:'relative',width:'144px',height:'144px',margin:'0 auto 28px'}}>
          {/* 4겹 회전 링 */}
          {[0,1,2,3].map(i=>(
            <div key={i} style={{position:'absolute',inset:0,borderRadius:'50%',border:'2px solid',borderColor:`hsla(${220+i*30},100%,65%,${.8-i*.15})`,animation:`spin ${1.5+i*.4}s linear infinite ${i%2===0?'':'reverse'}`,transform:`scale(${1-i*.18})`}}/>
          ))}
          {/* 중앙 아이콘 */}
          <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'2.5rem'}}>✨</div>
          {/* 8개 궤도 파티클 */}
          {Array.from({length:8},(_,i)=>(
            <div key={i} style={{position:'absolute',top:'50%',left:'50%',width:'7px',height:'7px',borderRadius:'50%',background:`hsl(${220+i*22},100%,65%)`,animation:`orbit ${2+i*.22}s linear infinite ${i*.22}s`,transformOrigin:`${-60+i*2}px 0`,boxShadow:'0 0 6px currentColor'}}/>
          ))}
        </div>
        <p style={{color:'#e2d9f3',fontFamily:"'Noto Serif KR',serif",fontSize:'1.05rem',fontWeight:300,letterSpacing:'0.06em',marginBottom:'16px'}}>{phases[phase]}</p>
        <div style={{width:'240px',height:'5px',background:'rgba(255,255,255,0.07)',borderRadius:'99px',overflow:'hidden',margin:'0 auto 10px'}}>
          <div style={{height:'100%',borderRadius:'99px',width:`${prog}%`,background:'linear-gradient(90deg,#7c3aed,#2563eb)',boxShadow:'0 0 8px rgba(139,92,246,0.8)',transition:'width .5s ease'}}/>
        </div>
        <div style={{display:'flex',gap:'6px',justifyContent:'center'}}>
          {phases.map((_,i)=><div key={i} style={{width:'6px',height:'6px',borderRadius:'50%',background:i<=phase?'#a78bfa':'#2a2a4a',boxShadow:i<=phase?'0 0 6px #a78bfa':'none',transition:'all .3s'}}/>)}
        </div>
      </div>
    </div>
  );
}

  const set=(k,v)=>setForm(f=>({...f,[k]:v}));

  const validate=()=>{
    const e={};
    if(!form.name.trim())e.name=true;
    if(!form.gender)e.gender=true;
    if(!form.birthdate)e.birthdate=true;
    if(!form.birthHour)e.birthHour=true;
    if(!form.mbti)e.mbti=true;
    if(!form.concern)e.concern=true;
    setErrors(e);
    return Object.keys(e).length===0;
  };

  /* ── 웹훅 전송: Make.com 구글시트 개별 필드 ── */
  const sendWebhook=async(data,lotto)=>{
    const now=new Date();
    const pad=n=>String(n).padStart(2,'0');
    const dateStr=`${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}`;
    const lottoStr=lotto.map((s,i)=>`세트${i+1}: ${s.join('-')}`).join(' | ');
    const nameVal=data.chineseName?`${data.name} (${data.chineseName})`:data.name;
    const payload={
      /* 구글시트 컬럼과 1:1 매핑 — 단순 flat JSON */
      "날짜":        dateStr,
      "이름":        nameVal,
      "생년월일":    data.birthdate,
      "태어난시간":  data.birthHour,
      "성별":        data.gender==='male'?'남성':data.gender==='female'?'여성':'',
      "태어난도시":  data.city||'',
      "MBTI":        data.mbti,
      "고민내용":    CONCERN_KR[data.concern]||data.concern,
      "추천로또번호":lottoStr,
      "유료결제여부":"Free",
      "전화번호":    data.phone||'',
      "이메일":      data.email||'',
    };
    try{
      await fetch(WEBHOOK,{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify(payload),
      });
    }catch(e){console.log('Webhook error:',e);}
  };

  const handleSubmit=()=>{
    if(!validate())return;
    /* GA4 커스텀 이벤트 — 동의 여부와 무관하게 항상 발생 */
    if(typeof gtag==='function'){
      gtag('event','saju_analysis_click',{
        mbti:form.mbti,
        concern:form.concern,
        agreed:form.agree,
      });
    }
    setReport(null);
    setAnalyzing(true);
  };

  const handleDone=useCallback(()=>{

              <label style={lbl}>연락처 정보 (선택)</label>
              <div style={{marginBottom:'10px'}}>
                <input type="email" placeholder="이메일 (결과 수신용)" value={form.email} onChange={e=>set('email',e.target.value)} onFocus={()=>setFocused('em')} onBlur={()=>setFocused(null)} style={inp('em')}/>
              </div>
              <input type="tel" placeholder="전화번호 (선택)" value={form.phone} onChange={e=>set('phone',e.target.value)} onFocus={()=>setFocused('ph')} onBlur={()=>setFocused(null)} style={inp('ph')}/>

              {/* 개인정보 동의 — 전면 개편 */}
              <label style={{display:'flex',alignItems:'flex-start',gap:'10px',marginTop:'14px',cursor:'pointer',padding:'12px 14px',borderRadius:'12px',background:'rgba(139,92,246,0.05)',border:`1px solid ${form.agree?'rgba(167,139,250,0.45)':'rgba(255,255,255,0.08)'}`}} onClick={()=>set('agree',!form.agree)}>
                <div style={{width:'18px',height:'18px',borderRadius:'5px',border:`2px solid ${form.agree?'#a78bfa':'rgba(167,139,250,0.3)'}`,background:form.agree?'rgba(139,92,246,0.35)':'transparent',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,marginTop:'2px',transition:'all .2s',cursor:'pointer'}}>
                  {form.agree&&<span style={{color:'#a78bfa',fontSize:'0.72rem',lineHeight:1,fontWeight:700}}>✓</span>}
                </div>
                <span style={{color:'rgba(167,139,250,0.7)',fontSize:'0.72rem',lineHeight:'1.75'}}>
                  <strong style={{color:form.agree?'#c4b5fd':'rgba(167,139,250,0.85)',fontSize:'0.76rem'}}>개인정보 수집 및 이용에 동의합니다</strong>
                  <span style={{color:'rgba(167,139,250,0.45)',marginLeft:'4px'}}>(선택)</span><br/>
                  <span style={{fontSize:'0.65rem',color:'rgba(167,139,250,0.4)',lineHeight:'1.8'}}>
                    수집 항목: 성별, 생년월일, MBTI, 고민내용<br/>
                    목적: 개인 맞춤형 사주 및 심리 분석 결과 제공<br/>
                    보유 기간: 분석 완료 후 즉시 파기 원칙
                  </span>
                  {form.agree&&(
                    <span style={{display:'block',marginTop:'6px',color:'rgba(74,222,128,0.75)',fontSize:'0.64rem'}}>
                      ✓ 동의하셨습니다. 분석 결과가 안전하게 저장됩니다.
                    </span>
                  )}
                  {!form.agree&&(
                    <span style={{display:'block',marginTop:'6px',color:'rgba(167,139,250,0.35)',fontSize:'0.62rem'}}>
                      미체크 시 분석은 정상 진행되나 결과가 저장되지 않습니다.
                    </span>
                  )}
                </span>
              </label>
            </div>

            {/* 🔒 아우름사주의 보안 약속 */}
            <div style={{borderRadius:'16px',padding:'16px 18px',marginBottom:'16px',background:'linear-gradient(135deg,rgba(16,30,60,0.85),rgba(10,20,50,0.8))',border:'1px solid rgba(96,165,250,0.25)',boxShadow:'0 0 20px rgba(59,130,246,0.07)'}}>
              <div style={{display:'flex',alignItems:'center',gap:'8px',marginBottom:'12px'}}>
                <span style={{fontSize:'1.05rem'}}>🔒</span>
                <span style={{color:'#93c5fd',fontSize:'0.76rem',fontWeight:700,letterSpacing:'0.08em'}}>아우름사주의 보안 약속</span>
              </div>
              <div style={{display:'flex',flexDirection:'column',gap:'9px'}}>
                {[
                  {icon:'🕵️',title:'익명성 보장',desc:'성함이나 연락처를 수집하지 않아 개인을 특정할 수 없습니다.'},
                  {icon:'🚫',title:'목적 외 사용 금지',desc:"입력하신 정보는 오직 '사주 분석'에만 사용되며 외부 유출이 절대 없습니다."},
                  {icon:'🗑️',title:'데이터 즉시 파기',desc:'무료 테스트 기간 중 수집된 정보는 결과 전달 후 안전하게 삭제됩니다.'},
                ].map((item,i)=>(
                  <div key={i} style={{display:'flex',alignItems:'flex-start',gap:'10px'}}>
                    <span style={{fontSize:'0.9rem',flexShrink:0,marginTop:'1px'}}>{item.icon}</span>
                    <p style={{fontSize:'0.7rem',lineHeight:'1.75',color:'rgba(191,219,254,0.7)'}}>
                      <strong style={{color:'rgba(147,197,253,0.9)',fontWeight:600}}>{item.title}:</strong>{' '}{item.desc}
                    </p>
                  </div>
                ))}
              </div>
            </div>

            {/* 제출 버튼 */}
            <button onClick={handleSubmit} className="neo-glow" style={{width:'100%',padding:'18px',borderRadius:'16px',fontSize:'1.05rem',fontWeight:600,fontFamily:"'Noto Serif KR',serif",letterSpacing:'0.14em',color:'#fff',border:'1px solid rgba(255,255,255,.12)',cursor:'pointer',background:'linear-gradient(135deg,#7c3aed,#4f46e5 40%,#2563eb 80%,#7c3aed)',backgroundSize:'200% auto',display:'flex',alignItems:'center',justifyContent:'center',gap:'10px',marginBottom:'32px'}}>
              <span style={{fontSize:'1.1rem'}}>✨</span>
              나의 사주 분석하기
              <span style={{fontSize:'1.1rem'}}>✨</span>
            </button>
          </div>
        )}

        {/* ─── 결과 ─── */}
        {report&&(
          <>
            <div ref={resultAnchor} style={{height:'1px'}}/>
            <div style={{display:'flex',alignItems:'center',gap:'12px',margin:'4px 0 20px'}}>
              <div style={{flex:1,height:'1px',background:'linear-gradient(to right,transparent,rgba(167,139,250,.4))'}}/>
              <div style={{display:'flex',alignItems:'center',gap:'6px',padding:'7px 16px',borderRadius:'99px',background:'rgba(139,92,246,.15)',border:'1px solid rgba(167,139,250,.25)'}}>
                <span style={{color:'#fbbf24',fontSize:'0.7rem'}}>★</span>
                <span style={{color:'#a78bfa',fontSize:'0.65rem',letterSpacing:'0.15em',fontWeight:700}}>ANALYSIS REPORT 2026</span>
                <span style={{color:'#fbbf24',fontSize:'0.7rem'}}>★</span>
              </div>
              <div style={{flex:1,height:'1px',background:'linear-gradient(to left,transparent,rgba(167,139,250,.4))'}}/>
            </div>
            <ReportSection
              data={report}
              form={form}
              onShare={()=>setShareOpen(true)}
              onLotto={()=>setLottoOpen(true)}
              reportRef={reportRef}
            />
            <button onClick={handleReset} style={{width:'100%',padding:'14px',borderRadius:'14px',background:'rgba(255,255,255,.025)',border:'1px solid rgba(167,139,250,.18)',color:'rgba(167,139,250,.65)',fontSize:'0.8rem',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:'6px',marginBottom:'20px',letterSpacing:'0.06em'}}>
              ↺ 처음부터 다시 분석하기
            </button>
          </>
        )}

        {/* ─── 푸터 ─── */}
        <div style={{textAlign:'center',paddingBottom:'20px',borderTop:'1px solid rgba(255,255,255,0.04)',paddingTop:'16px'}}>
          <p style={{color:'rgba(167,139,250,.18)',fontSize:'0.6rem',letterSpacing:'0.08em'}}>© 2026 MY SAJU MASTER · Powered by Cosmic Intelligence<br/>All rights reserved · mysajumaster.com</p>
        </div>
      </div>

      {analyzing&&<Analyzing onDone={handleDone}/>}
      {shareOpen&&report&&<ShareModal report={report} form={form} onClose={()=>setShareOpen(false)}/>}
      {lottoOpen&&report&&<LottoCopyModal lotto={report.lotto} onClose={()=>setLottoOpen(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
