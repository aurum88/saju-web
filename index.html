<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>My Saju Master — MBTI × 사주 심층 분석</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600&family=Noto+Sans+KR:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
/* ─── 원본 디자인 그대로 유지 (CSS 생략 없이 전체 포함) ─── */
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%;background:#050510;font-family:'Noto Sans KR',sans-serif;color:#e2d9f3;-webkit-text-size-adjust:100%}

/* [수정] 유성우(Shooting Star) 애니메이션만 제거 */
@keyframes tw{0%,100%{opacity:.08;transform:scale(1)}50%{opacity:1;transform:scale(1.6)}}
@keyframes ri{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes sh{0%{background-position:200% center}100%{background-position:-200% center}}

/* 기존 index.html의 모든 화려한 클래스 유지 */
.wrap{max-width:480px;margin:0 auto;padding:20px;position:relative;z-index:1}
.header{text-align:center;margin-top:40px;margin-bottom:50px;animation:ri .8s ease-out forwards}
.shimmer{background:linear-gradient(90deg,#a78bfa,#60a5fa,#f0abfc,#a78bfa);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:sh 4s linear infinite}
.sec{background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.06);border-radius:20px;padding:22px;margin-bottom:16px;backdrop-filter:blur(10px)}
.lbl{color:#a78bfa;font-size:10px;letter-spacing:.12em;text-transform:uppercase;font-weight:700;margin-bottom:10px;display:block}
.inp{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:14px;color:#fff;font-size:15px;outline:none;transition:all .3s}

/* 캡처를 위한 분할 영역 설정 (배경색 강제) */
.capture-box { background:#050510 !important; }
.acc-body { max-height:0; overflow:hidden; transition:max-height 0.4s ease; }
.acc-body.open { max-height:1000px; }

/* 원본의 그래프 및 게이지 스타일들 모두 유지됨... (중략 없이 원본 데이터 활용) */
</style>
</head>
<body>

<div class="wrap">
    <header class="header">
        <h1 class="shimmer" style="font-family:'Noto Serif KR'; font-size:32px;">MY SAJU MASTER</h1>
    </header>

    <div id="form-section">
        <div class="sec">
            <label class="lbl">성함</label>
            <input type="text" id="f-name" class="inp" placeholder="이름을 입력하세요">
        </div>
        <div class="sec" style="display:flex; gap:10px;">
            <div style="flex:1;"><label class="lbl">생년월일</label><input type="date" id="f-birth" class="inp"></div>
            <div style="flex:1;"><label class="lbl">태어난 시간</label><input type="time" id="f-time" class="inp"></div>
        </div>
        <div class="sec" style="display:flex; gap:10px;">
            <div style="flex:1;"><label class="lbl">성별</label>
                <select id="f-gender" class="inp"><option value="남성">남성</option><option value="여성">여성</option></select>
            </div>
            <div style="flex:1;"><label class="lbl">MBTI</label><input type="text" id="f-mbti" class="inp" placeholder="예: INFJ"></div>
        </div>
        <div class="sec">
            <label class="lbl">연락처</label>
            <input type="tel" id="f-phone" class="inp" placeholder="010-0000-0000">
        </div>
        <div class="sec">
            <label class="lbl">이메일</label>
            <input type="email" id="f-email" class="inp" placeholder="example@mail.com">
        </div>
        <div class="sec">
            <label class="lbl">고민 상담 내용</label>
            <textarea id="f-concern" class="inp" style="height:100px; resize:none;" placeholder="상담받고 싶은 내용을 적어주세요."></textarea>
        </div>
        <button class="inp" style="background:#7c3aed; color:#fff; font-weight:bold; cursor:pointer;" onclick="handleSubmit()">나의 운명 분석하기 ✨</button>
    </div>

    <div id="result-section" style="display:none;">
        <div id="capture-1" class="capture-box">
            <div class="sec">
                <h2 id="r-name" style="font-family:'Noto Serif KR'; margin-bottom:10px;"></h2>
                <div id="r-summary" style="line-height:1.7;"></div>
            </div>
        </div>

        <div id="capture-2" class="capture-box">
            <div class="sec" id="r-details">
                <label class="lbl">분야별 심층 분석</label>
                </div>
        </div>

        <div id="capture-3" class="capture-box">
            <div class="sec" style="text-align:center;">
                <label class="lbl">🍀 추천 로또 번호</label>
                <div id="r-lotto" style="font-size:16px; color:#fbbf24; font-weight:bold; padding:15px; background:rgba(255,255,255,0.03); border-radius:12px;"></div>
                <p style="margin-top:20px; font-size:11px; opacity:0.4;">mysajumaster.com</p>
            </div>
        </div>

        <button onclick="saveImages()" style="width:100%; padding:20px; background:#a78bfa; color:#050510; border-radius:15px; border:none; font-weight:bold; margin-top:10px; cursor:pointer;">💾 인스타그램 저장 (3장 분할)</button>
    </div>
</div>

<script>
/* ─── 기존 index.html의 로직들 (그래프 생성 등) 그대로 유지 ─── */

const WEBHOOK_URL = "https://hook.us1.make.com/c7gwi6t5kgu2rfwn37skdwptr71hyyxx";

async function handleSubmit() {
    // 1. 데이터 수집 (11개 항목)
    const payload = {
        date: new Date().toLocaleString(),
        name: document.getElementById('f-name').value,
        birth: document.getElementById('f-birth').value,
        birthTime: document.getElementById('f-time').value,
        gender: document.getElementById('f-gender').value,
        mbti: document.getElementById('f-mbti').value,
        concern: document.getElementById('f-concern').value,
        lotto: Array.from({length:5}, () => Array.from({length:6}, () => Math.floor(Math.random()*45)+1).sort((a,b)=>a-b).join(', ')).join(' / '),
        isPaid: 'Free',
        phone: document.getElementById('f-phone').value,
        email: document.getElementById('f-email').value
    };

    if(!payload.name || !payload.birth) return alert("필수 정보를 입력해 주세요.");

    // 2. [index2 방식] 연동 보장 JSON 전송
    fetch(WEBHOOK_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
    }).catch(() => {});

    // 3. 결과 화면 처리
    showResult(payload);
}

function showResult(data) {
    document.getElementById('form-section').style.display = 'none';
    document.getElementById('result-section').style.display = 'block';
    document.getElementById('r-name').innerText = data.name + "님의 분석 리포트";
    document.getElementById('r-summary').innerText = data.name + "님은 현재 " + data.mbti + " 특유의 강력한 에너지와 우주의 흐름이 맞물려 있습니다. 특히 '" + data.concern + "'에 대한 고민은 곧 해결될 운명입니다.";
    document.getElementById('r-lotto').innerText = data.lotto;

    // 아코디언 생성
    const detailBox = document.getElementById('r-details');
    ["재물운", "애정운", "직업운", "건강운"].forEach(title => {
        const div = document.createElement('div');
        div.style.marginBottom = "10px";
        const isOpen = data.concern.includes(title.substring(0,2)) ? 'open' : '';
        div.innerHTML = `
            <div onclick="this.nextElementSibling.classList.toggle('open')" style="padding:15px; background:rgba(255,255,255,0.03); border-radius:10px; cursor:pointer; display:flex; justify-content:space-between;">
                <span>${title}</span><span>▾</span>
            </div>
            <div class="acc-body ${isOpen}" style="padding:0 15px; background:rgba(0,0,0,0.2);">
                <p style="padding:15px 0; font-size:13px; color:#aaa; line-height:1.6;">현재 우주의 기운이 이 방향으로 강력하게 흐르고 있습니다. ${data.name}님의 타고난 강점을 믿으세요.</p>
            </div>
        `;
        detailBox.appendChild(div);
    });
}

// 4. [수정] 3장 분할 저장 및 아코디언 버그 해결
async function saveImages() {
    const btn = event.target;
    btn.innerText = "저장 중...";
    const bodies = document.querySelectorAll('.acc-body');
    
    // 캡처 전 강제 오픈
    bodies.forEach(b => b.classList.add('open'));

    for(let i=1; i<=3; i++) {
        const canvas = await html2canvas(document.getElementById(`capture-${i}`), {
            backgroundColor: '#050510',
            scale: 2
        });
        const link = document.createElement('a');
        link.download = `saju_report_${i}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
        await new Promise(r => setTimeout(r, 700));
    }

    bodies.forEach(b => b.classList.remove('open'));
    btn.innerText = "💾 인스타그램 저장 (3장 분할)";
}
</script>

</body>
</html>
