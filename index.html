<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아우름 AI 사주 - 프리미엄 서비스</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&display=swap');
        body { font-family: 'Noto Serif KR', serif; background-color: #f9f7f2; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [name, setName] = useState('');
            const [birth, setBirth] = useState('');
            const [result, setResult] = useState('');
            const [loading, setLoading] = useState(false);

            const analyzeSaju = async () => {
                if (!name || !birth) return alert("성함과 정보를 입력해주세요.");
                setLoading(true);
                setResult("");

                try {
                    // [중요] Vercel이 실제 키를 꽂아줄 수 있도록 주소를 구성합니다.
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=YOUR_API_KEY_PLACEHOLDER`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: `${name}(${birth})의 사주를 명리학적으로 분석하고 따뜻한 덕담을 해줘.` }] }]
                        })
                    });

                    const data = await response.json();
                    if (response.ok) {
                        setResult(data.candidates[0].content.parts[0].text);
                    } else {
                        setResult("분석 준비 중입니다. 잠시 후 다시 시도해주세요.");
                    }
                } catch (e) {
                    setResult("연결이 원활하지 않습니다.");
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="max-w-md mx-auto min-h-screen p-6 flex flex-col justify-center">
                    <div className="bg-white rounded-3xl shadow-xl p-8 border border-stone-200">
                        <h1 className="text-3xl font-bold text-center text-stone-800 mb-2">아우름 사주</h1>
                        <p className="text-center text-stone-500 mb-8 italic text-sm">AI가 전하는 따뜻한 운명 상담</p>
                        
                        <div className="space-y-4">
                            <input className="w-full p-4 bg-stone-50 border-none rounded-2xl" placeholder="성함" onChange={e=>setName(e.target.value)} />
                            <input className="w-full p-4 bg-stone-50 border-none rounded-2xl" placeholder="생년월일 (시간포함)" onChange={e=>setBirth(e.target.value)} />
                            <button onClick={analyzeSaju} disabled={loading} className="w-full bg-stone-800 text-white p-4 rounded-2xl font-bold">
                                {loading ? "운명을 분석하는 중..." : "분석 시작하기"}
                            </button>
                        </div>
                        {result && <div className="mt-8 p-6 bg-stone-50 rounded-2xl text-stone-700 whitespace-pre-wrap">{result}</div>}
                    </div>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
