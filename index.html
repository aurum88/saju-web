/* ── SEED RANDOM ── */
function srand(seed){let s=seed;return()=>{s=(s*9301+49297)%233280;return s/233280;};}
function gseed(f){
  /* 명리학 입력 변수를 최대한 활용해 고유 시드 생성
     이름(한글+한자) + 생년월일(년·월·일) + 출생시간 + 성별 + 도시 + MBTI + 고민
     → 동일 조건 반복 입력 시 항상 같은 결과 (재현성 보장)
     → 조건이 조금만 달라도 완전히 다른 결과 (개인화 보장) */
  const name=(f.name||'가')+(f.chineseName||'');
  const birth=(f.birthdate||'2000-01-01');
  const [yy,mm,dd]=(birth+'-01-01').split('-').map(Number);
  const hour=parseInt((f.birthHour||'0'),10)||0;
  const gender=f.gender==='male'?3:f.gender==='female'?7:1;
  const city=f.city||'';
  const mbti=f.mbti||'INFP';
  const concern=f.concern||'wealth';
  /* 가중치를 달리 줘서 각 변수가 결과에 충분히 반영되도록 */
  const base=name.split('').reduce((a,c)=>a+c.charCodeAt(0)*31,0)
    +yy*367+mm*29+dd*11+hour*97
    +gender*53
    +city.split('').reduce((a,c)=>a+c.charCodeAt(0)*17,0)
    +mbti.split('').reduce((a,c)=>a+c.charCodeAt(0)*43,0)
    +concern.split('').reduce((a,c)=>a+c.charCodeAt(0)*13,0);
  return Math.abs(base)%999983; // 소수로 나눠 분포 균일화
}

/* ── LOTTO GENERATOR ── */
function genLotto(rand){
  const sets=[];
  for(let s=0;s<5;s++){
    const pool=new Set();
    while(pool.size<6)pool.add(Math.floor(rand()*45)+1);
    sets.push([...pool].sort((a,b)=>a-b));
  }
  return sets;
}

const CG_OH={갑:"목",을:"목",병:"화",정:"화",무:"토",기:"토",경:"금",신:"금",임:"수",계:"수"};
const JJ_OH={자:"수",축:"토",인:"목",묘:"목",진:"토",사:"화",오:"화",미:"토",신:"금",유:"금",술:"토",해:"수"};
const JJ_TI={자:"쥐",축:"소",인:"호랑이",묘:"토끼",진:"용",사:"뱀",오:"말",미:"양",신:"원숭이",유:"닭",술:"개",해:"돼지"};
const MON_JJ=["","인","묘","진","사","오","미","신","유","술","해","자","축"];

function getSaju(birthdate,birthHour){
  const parts=(birthdate||'2000-01-01').split('-');
  const y=parseInt(parts[0])||2000,m=parseInt(parts[1])||1,d=parseInt(parts[2])||1;
  const h=parseInt(birthHour)||0;
  /* 연주 */
  const yIdx=((y-1924)%60+60)%60;
  const yS=GANJIS[yIdx]||GANJIS[0];
  /* 월지 */
  const mJ=MON_JJ[m]||"인";
  /* 일주 — 율리우스적일수 */
  const a=Math.floor((14-m)/12);
  const yy=y-a,mm=m+12*a-2;
  const jd=d+Math.floor((153*mm+2)/5)+365*yy+Math.floor(yy/4)-Math.floor(yy/100)+Math.floor(yy/400)-32045;
  const dIdx=((jd-10)%60+60)%60;
  const dS=GANJIS[dIdx]||GANJIS[0];
  /* 시지 */
  const hJiArr=["자","축","인","묘","진","사","오","미","신","유","술","해"];
  const hJ=hJiArr[Math.min(11,Math.floor((h+1)/2))];
  return{ySaju:yS,mJi:mJ,dSaju:dS,hJi:hJ,
    yGan:yS[0],yJi:yS[1],dGan:dS[0],dJi:dS[1],
    ti:JJ_TI[yS[1]]||"용",y,m,d,h};
}

function calcOhengFromSaju(sj,gender,rand){
  const cnt={목:0,화:0,토:0,금:0,수:0};
  const addG=g=>{if(g&&CG_OH[g])cnt[CG_OH[g]]+=2;};
  const addJ=j=>{if(j&&JJ_OH[j])cnt[JJ_OH[j]]+=1.5;};
  addG(sj.yGan);addJ(sj.yJi);
  addJ(sj.mJi);
  addG(sj.dGan);addJ(sj.dJi);
  addJ(sj.hJi);
  /* 성별 보정 */
  if(gender==='male'){cnt.화+=0.6;cnt.목+=0.4;}
  else{cnt.수+=0.6;cnt.금+=0.4;}
  /* 자연 변동성 (시드 연동) */
  Object.keys(cnt).forEach(k=>cnt[k]+=rand()*0.6);
  Object.keys(cnt).forEach(k=>{if(cnt[k]<0.5)cnt[k]=0.5+rand()*0.3;});
  const tot=Object.values(cnt).reduce((a,b)=>a+b,0);
  const keyMap={"목 木":"목","화 火":"화","토 土":"토","금 金":"금","수 水":"수"};
  return OHENG.map(o=>({...o,pct:Math.round((cnt[keyMap[o.name]]||0)/tot*100)}));
}

  const luckMap={

    "화 火":{color:"레드·오렌지·핑크",hex:"#f87171",item:"루비 반지·산호석",fashion:"붉은 포인트 컬러 V넥",gem:"루비·가넷",food:"고추·토마토·석류",place:"카페·남향 공간·야외 테라스",number:"2, 7"},
    "토 土":{color:"황토·아이보리·골드",hex:"#fbbf24",item:"황동 열쇠고리·황토 도자기",fashion:"어스톤 레이어드 룩",gem:"시트린·호안석",food:"고구마·된장·황금 키위",place:"박물관·고즈넉한 카페·전통 한옥",number:"5, 0"},
    "금 金":{color:"화이트·실버·아이스블루",hex:"#c0cfe8",item:"실버 체인 목걸이·백수정",fashion:"모노크롬 화이트 메탈릭",gem:"다이아몬드·백수정",food:"배·흰쌀·두부·우유",place:"미술관·도서관·고급 호텔 라운지",number:"4, 9"},
    "수 水":{color:"딥블루·네이비·검정",hex:"#60a5fa",item:"청금석 브레이슬릿",fashion:"네이비·블랙 미니멀 시크",gem:"사파이어·라피스라줄리",food:"검은콩·미역·블루베리",place:"바다·강변·수영장·온천",number:"1, 6"},
  };
  const lucky=luckMap[dom.name]||luckMap["수 水"];
  const trait=traits[f.mbti]||"독특한 개성";
  const nm=f.name||"고객님";

  /* ── 명리학 맞춤 텍스트 변수 ── */
  const tiTxt=`${sj.ti}띠`;
  const ilJu=`${sj.dGan}${sj.dJi}일주`;
  const weakName=weak.name.replace(/ .+/,""); /* "목","화" 등 */
  const gTxt=f.gender==='male'?"양(陽)":"음(陰)";
  const m2=(n)=>{const v=sj.m+n;return v>12?v-12:v<1?v+12:v;};
  const domBodyPart={"목 木":"간·담·근육·눈","화 火":"심장·소장·혈관·혀","토 土":"비장·위장·소화기·입","금 金":"폐·대장·피부·코","수 Water":"신장·방광·뼈·귀","수 水":"신장·방광·뼈·귀"};
  const bodyPart=domBodyPart[dom.name]||"전신 기운";

  /* ── 개인화된 운세 텍스트 ── */
  const overallTpl=`${nm}님은 ${tiTxt}(${sj.y}년 ${sj.m}월 ${sj.d}일생)으로, 사주의 일주(日柱)는 '${ilJu}'입니다. ${gTxt}의 기운을 지닌 ${ilJu}는 ${dom.emoji}${dom.name}이 주도하는 명식(命式)으로, ${f.mbti||'INFP'}의 타고난 ${trait}과 결합해 2026년 강력한 시너지를 냅니다. 사주 내 ${weakName} 기운이 상대적으로 얕으니 ${lucky.item} 소지와 ${lucky.color} 스타일링으로 균형을 맞추는 것이 올해의 핵심 개운법입니다. ${sj.m}~${m2(3)}월은 내실을 다지는 시기, ${m2(4)}~${m2(7)}월은 확장과 결실의 기운이 강해집니다. 일주 ${ilJu}가 품은 ${dom.name}의 정기(精氣)가 모든 선택의 든든한 배경이 되어줄 2026년, 자신의 가치관을 세상에 선명하게 드러내는 용기가 가장 큰 행운의 열쇠입니다.`;

  const wealthTpl=`${ilJu} 일주의 재성(財星)을 살피면, ${dom.name.includes("토")||dom.name.includes("금")?"재물 기운이 두터운 배치로 올해 수입 상승 가능성이 높습니다":"재물의 흐름은 하반기에 집중되므로 상반기에 기반을 다지는 전략이 최선입니다"}. 재물 귀인은 ${f.gender==='male'?"나이 차이가 있는 여성 계열의 전문직 종사자":"신뢰감 있는 남성 계열의 경험자"} 타입이 많으며, ${m2(2)}~${m2(4)}월에 핵심 재물 기회가 집중됩니다. ${weakName} 기운의 약세가 재물 흐름의 걸림돌이 될 수 있으니 ${lucky.item}으로 보완하고, 행운 숫자 ${lucky.number}을 금융 결정 날짜나 계좌 비밀번호 끝자리에 활용해보세요. 단기 투기보다 ${lucky.color} 계열 지갑에 꾸준히 모으는 적립 방식이 ${ilJu} 일주의 기운과 잘 맞습니다.`;

  const loveTpl=`${ilJu} 일주는 ${dom.name.includes("수")||dom.name.includes("목")?"감성이 깊고 진정성을 중시하는 기운으로, 겉모습보다 내면의 교감에 끌리는 타입입니다":"열정적이고 솔직한 감정 표현이 좋은 결과를 만드는 기운으로, 먼저 다가가는 행동력이 큰 강점입니다"}. ${tiTxt}에게 올해 잘 맞는 인연은 ${f.gender==='male'?"음(陰)적 기운이 강한—차분하고 내면이 풍부한":"양(陽)적 기운이 강한—활동적이고 추진력 있는"} 타입입니다. 인연의 피크는 ${m2(1)}월과 ${m2(5)}월이며, 지적 관심사를 공유하는 모임·온라인 커뮤니티·세미나에서 만남이 성사될 가능성이 큽니다. 비즈니스 파트너십에서는 ${trait}이 신뢰 구축의 핵심 자산이 되므로, 처음 만나는 자리에서 자신의 가치관을 명확히 전달하는 것이 중요합니다.`;

  const careerTpl=`${ilJu} 일주의 관성(官星)과 식상(食傷)을 살피면, ${dom.name.includes("화")||dom.name.includes("목")?"창의적·도전적 업무에서 탁월한 성과를 내는 해입니다. 신규 사업·크리에이티브·기획 분야에서의 도약이 기대됩니다":"안정적이고 체계적인 환경에서 전문성을 축적하는 해입니다. 기존 조직 내 신뢰 구축과 역량 심화가 핵심입니다"}. ${f.mbti||'INFP'}의 ${trait}이 이 해에 특히 강점으로 작용하며, 커리어 결정의 적기는 ${m2(3)}~${m2(5)}월입니다. 나와 다른 성향—${weakName}의 기운을 가진 멘토를 가까이 두면 사각지대를 메우며 성장 속도가 배가됩니다.`;

  const healthTpl=`${tiTxt}(${sj.y}년생)의 건강은 ${dom.name}이 주도하는 명식 특성상 ${bodyPart} 부위에 각별한 주의가 필요합니다. 특히 ${sj.m}~${m2(3)}월 피로 누적에 주의하고, ${m2(4)}월 이후 체력이 회복되는 전환점이 찾아옵니다. 행운 음식 ${lucky.food}을 주 3회 이상 섭취하면 약한 ${weakName} 기운을 보완해 체내 오행의 균형이 맞춰집니다. ${lucky.gem}을 몸에 지니면 ${dom.name}의 치유 기운이 활성화되고, 취침 전 30분 디지털 디톡스 + 감사 저널링 3가지가 숙면과 운세 상승을 동시에 이끌어냅니다.`;

  const mentorTpl=`${ilJu} 일주에게 찾아오는 귀인은 ${dom.name.includes("수")||dom.name.includes("금")?"조용하고 깊이 있는 분야의 전문가":"활동적이고 넓은 인맥을 가진 연결자"} 타입이 많습니다. ${f.gender==='male'?"여성 계열의 연상":"남성 계열의 경험자"} 또는 해외 경험이 풍부한 분이 핵심 귀인이 될 가능성이 높으며, 특히 ${m2(2)}월과 ${m2(6)}월에 예상치 못한 조력자가 등장합니다. ${lucky.place}에서 우연히 이루어지는 만남을 소홀히 여기지 마세요. ${weakName} 기운이 부족한 ${ilJu} 일주는 그 기운을 보완해줄 사람이 진정한 귀인이 되며, 내가 먼저 누군가의 귀인이 되어주는 선행이 인복을 키우는 가장 빠른 길입니다.`;

  const studyTpl=`${ilJu} 일주의 학업·시험운을 보면, ${dom.name.includes("금")||dom.name.includes("수")?"집중력과 분석력이 강화되는 해로 자격증·고시·전문직 시험에 특히 유리한 기운입니다":"창의적 사고와 표현력이 강화되는 해로 논술·면접·발표 중심 시험에서 두각을 나타낼 수 있습니다"}. ${f.mbti||'INFP'}의 ${trait}이 학업에서도 강점이 되며, 집중력 골든타임은 오전 6~9시·오후 9~11시입니다. 합격 기운의 피크는 ${m2(1)}월과 ${m2(5)}월이고, 행운의 공부 장소 ${lucky.place}를 학습 공간으로 삼으면 집중력이 배가됩니다. 행운 숫자 ${lucky.number}을 시험 접수·날짜 선택에 활용하면 긍정 에너지를 극대화할 수 있습니다.`;

  const habitTpl=`${tiTxt}(${sj.y}년생)에게 가장 잘 맞는 행운의 장소는 ${lucky.place}이며, 중요한 결정 전날 이곳을 방문하면 ${dom.name}의 기운이 상승합니다. 아침 루틴: 기상 후 15분 이내 미지근한 물 한 잔 + 자연광 받기. 행운 음식 ${lucky.food}을 주 3회 이상 섭취하면 약한 ${weakName} 기운을 보완해 전반적인 운세 흐름이 부드러워집니다. ${lucky.gem}을 몸에 지니거나 책상 위에 두면 집중력과 판단력이 향상됩니다. 취침 전 디지털 기기 30분 차단 + 감사 세 가지 저널링이 숙면과 다음 날 운세를 높이는 핵심 개운법입니다.`;

  return{oheng,wealth,love,career,health,mentor,study,week,lotto,dom,lucky,trait,sj,tiTxt,ilJu,weakName,
    overall:overallTpl,wealthDeep:wealthTpl,loveDeep:loveTpl,habitDeep:habitTpl,
    careerDeep:careerTpl,healthDeep:healthTpl,mentorDeep:mentorTpl,studyDeep:studyTpl};
}

/* ── STAR FIELD (별똥별 없음 — 초창기 스타일 그대로) ── */
function StarField(){
  const stars=useRef(Array.from({length:70},(_,i)=>({id:i,x:Math.random()*100,y:Math.random()*100,sz:Math.random()*2+.5,delay:Math.random()*4,op:Math.random()*.7+.1,dur:Math.random()*3+2}))).current;
  return(
    <div style={{position:'fixed',inset:0,pointerEvents:'none',overflow:'hidden',zIndex:0}}>
      {stars.map(s=><div key={s.id} style={{position:'absolute',left:`${s.x}%`,top:`${s.y}%`,width:s.sz,height:s.sz,background:'white',borderRadius:'50%',opacity:s.op,animation:`twinkle ${s.dur}s ease-in-out infinite ${s.delay}s`}}/>)}
    </div>
  );
}

/* ── CIRCULAR GAUGE ── */
function CG({value,label,icon,color,delay=0}){
  const [anim,setAnim]=useState(0);
  const r=36,cx=42,cy=42,circ=2*Math.PI*r,dash=(anim/100)*circ;
  useEffect(()=>{const t=setTimeout(()=>{let st=null;const step=(ts)=>{if(!st)st=ts;const p=Math.min((ts-st)/1200,1);setAnim(Math.floor(p*value));if(p<1)requestAnimationFrame(step);};requestAnimationFrame(step);},delay);return()=>clearTimeout(t);},[value,delay]);
  return(
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:'6px'}}>
      <div style={{position:'relative'}}>
        <svg width="84" height="84" style={{transform:'rotate(-90deg)'}}>
          <circle cx={cx} cy={cy} r={r} fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth="6"/>
          <circle cx={cx} cy={cy} r={r} fill="none" stroke={color} strokeWidth="6" strokeDasharray={`${dash} ${circ}`} strokeLinecap="round" style={{filter:`drop-shadow(0 0 7px ${color})`}}/>
        </svg>
        <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}}>
          <span style={{fontSize:'0.95rem'}}>{icon}</span>
          <span style={{color:'#e2d9f3',fontSize:'0.9rem',fontWeight:700}}>{anim}<span style={{fontSize:'0.5rem'}}>%</span></span>
        </div>
      </div>
      <span style={{color:'rgba(167,139,250,0.8)',fontSize:'0.65rem',letterSpacing:'0.06em'}}>{label}</span>
    </div>
  );
}

/* ── OHENG BAR ── */
function OBar({item,delay}){
  const [w,setW]=useState(0);
  useEffect(()=>{const t=setTimeout(()=>setW(item.pct),delay);return()=>clearTimeout(t);},[item.pct,delay]);
  return(
    <div style={{marginBottom:'10px'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'5px'}}>
        <span style={{color:item.color,fontSize:'0.76rem',fontWeight:600,textShadow:`0 0 8px ${item.shadow}`}}>{item.emoji} {item.name}</span>
        <span style={{color:'rgba(226,217,243,0.5)',fontSize:'0.68rem'}}>{item.pct}%</span>
      </div>
      <div style={{height:'6px',background:'rgba(255,255,255,0.05)',borderRadius:'99px',overflow:'hidden'}}>
        <div style={{height:'100%',borderRadius:'99px',width:`${w}%`,background:`linear-gradient(90deg,${item.color}55,${item.color})`,boxShadow:`0 0 8px ${item.shadow}`,transition:`width 1.2s cubic-bezier(.4,0,.2,1) ${delay}ms`}}/>
      </div>
    </div>
  );
}

/* ── WEEK CHART ── */
function WeekChart({data}){
  const max=Math.max(...data.map(d=>d.val));
  const [shown,setShown]=useState(false);
  useEffect(()=>{const t=setTimeout(()=>setShown(true),400);return()=>clearTimeout(t);},[]);
  const lc={길:'#4ade80',중:'#fbbf24',소:'#f87171'};
  const W=290,H=58,P=14;
  const pts=data.map((d,i)=>({x:P+(i/(data.length-1))*(W-P*2),y:H-P-((d.val/max)*(H-P*2)),...d}));
  const pathD=pts.map((p,i)=>`${i===0?'M':'L'}${p.x},${p.y}`).join(' ');
  return(
    <div>
      <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{overflow:'visible'}}>
        <defs><linearGradient id="wg" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stopColor="#a78bfa"/><stop offset="50%" stopColor="#60a5fa"/><stop offset="100%" stopColor="#f472b6"/></linearGradient></defs>
        <path d={pathD} fill="none" stroke="url(#wg)" strokeWidth="2.2" style={{strokeDasharray:shown?'1000':'0',strokeDashoffset:shown?'0':'1000',transition:'stroke-dashoffset 1.8s ease',filter:'drop-shadow(0 0 4px rgba(167,139,250,0.5))'}}/>
        {pts.map((p,i)=><circle key={i} cx={p.x} cy={p.y} r="4" fill={lc[p.lbl]||'#a78bfa'} style={{filter:`drop-shadow(0 0 4px ${lc[p.lbl]})`,opacity:shown?1:0,transition:`opacity .4s ${.9+i*.1}s`}}/>)}
      </svg>
      <div style={{display:'flex',justifyContent:'space-between',marginTop:'6px'}}>
        {data.map((d,i)=>(
          <div key={i} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:'2px'}}>
            <span style={{fontSize:'0.7rem'}}>{d.emoji}</span>
            <span style={{color:'rgba(167,139,250,0.5)',fontSize:'0.58rem'}}>{d.day}</span>
            <span style={{fontSize:'0.55rem',color:lc[d.lbl],fontWeight:700}}>{d.lbl}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ── LOTTO BALLS ── */
function LottoBalls({sets}){
  const colors=['#fbbf24','#f97316','#ec4899','#8b5cf6','#06b6d4'];
  return(
    <div style={{display:'flex',flexDirection:'column',gap:'12px'}}>
      {sets.map((set,si)=>(
        <div key={si} style={{display:'flex',alignItems:'center',gap:'8px'}}>
          <span style={{color:colors[si],fontSize:'0.65rem',fontWeight:700,minWidth:'20px',letterSpacing:'0.05em'}}>{si+1}세트</span>
          <div style={{display:'flex',gap:'6px',flexWrap:'wrap'}}>
            {set.map((n,ni)=>(
              <div key={ni} className="lotto-ball" style={{width:'36px',height:'36px',borderRadius:'50%',background:`radial-gradient(circle at 35% 35%, ${colors[si]}ff, ${colors[si]}66)`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'0.75rem',fontWeight:800,color:'#fff',border:`2px solid ${colors[si]}`,animationDelay:`${si*.3+ni*.1}s`,flexShrink:0}}>
                {n}
              </div>
            ))}
          </div>
        </div>
      ))}
    </div>
  );
}

/* ── ACCORDION ── */
function Accordion({icon,title,children,open:defaultOpen=false,accent='#a78bfa'}){
  const [open,setOpen]=useState(defaultOpen);
  return(
    <div style={{borderRadius:'14px',border:`1px solid ${open?accent+'44':'rgba(255,255,255,0.07)'}`,background:open?`${accent}0a`:'rgba(255,255,255,0.02)',marginBottom:'10px',transition:'all .3s ease',overflow:'hidden'}}>
      <button onClick={()=>setOpen(o=>!o)} style={{width:'100%',display:'flex',alignItems:'center',justifyContent:'space-between',padding:'14px 16px',background:'none',border:'none',cursor:'pointer',outline:'none'}}>
        <div style={{display:'flex',alignItems:'center',gap:'10px'}}>
          <span style={{fontSize:'1rem'}}>{icon}</span>
          <span style={{color:open?accent:'rgba(226,217,243,0.75)',fontSize:'0.82rem',fontWeight:600,letterSpacing:'0.05em'}}>{title}</span>
        </div>
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" style={{color:accent,transform:open?'rotate(0)':'rotate(-90deg)',transition:'transform .3s'}}>
          <path d={open?"M3 6l5 5 5-5":"M6 3l5 5-5 5"} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      </button>
      <div className={`accordion-body ${open?'open':''}`}>
        <div style={{padding:'0 16px 16px',color:'rgba(209,213,219,0.85)',fontSize:'0.8rem',lineHeight:'1.95',borderTop:`1px solid ${accent}22`}}>
          <div style={{paddingTop:'12px'}}>{children}</div>
        </div>
      </div>
    </div>
  );

/* ── ANALYZING OVERLAY — Gemini AI 대기 버전 ── */
function Analyzing(){
  const [phase,setPhase]=useState(0);
  const phases=[
    "생년월일 & 사주 데이터 수집 중...",
    "오행(五行) 기운 분석 중...",
    "일주(日柱)와 월지(月支) 해석 중...",
    "MBTI × 명리학 시너지 분석 중...",
    "운명의 실타래를 해석 중...",
    "AI 명리학 대가에게 전달 중...",
    "맞춤형 사주 리포트 완성 중...",
  ];
  useEffect(()=>{
    const gaps=[900,900,900,900,1000,1500,99999];
    let ph=0,timer;
    const tick=()=>{if(ph<phases.length-1){ph++;setPhase(ph);timer=setTimeout(tick,gaps[ph]);}};
    timer=setTimeout(tick,gaps[0]);
    return()=>clearTimeout(timer);
  },[]);
  const prog=Math.min(94,Math.round((phase/(phases.length-1))*100));
  return(
    <div style={{position:'fixed',inset:0,zIndex:90,display:'flex',alignItems:'center',justifyContent:'center',background:'rgba(5,5,20,0.97)'}}>
      <div style={{textAlign:'center',padding:'0 32px'}}>
        <div style={{position:'relative',width:'144px',height:'144px',margin:'0 auto 28px'}}>
          {[0,1,2,3].map(i=>(
            <div key={i} style={{position:'absolute',inset:0,borderRadius:'50%',border:'2px solid',borderColor:`hsla(${220+i*30},100%,65%,${.8-i*.15})`,animation:`spin ${1.5+i*.4}s linear infinite ${i%2===0?'':'reverse'}`,transform:`scale(${1-i*.18})`}}/>
          ))}
          <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'2.5rem'}}>✨</div>
          {Array.from({length:8},(_,i)=>(
            <div key={i} style={{position:'absolute',top:'50%',left:'50%',width:'7px',height:'7px',borderRadius:'50%',background:`hsl(${220+i*22},100%,65%)`,animation:`orbit ${2+i*.22}s linear infinite ${i*.22}s`,transformOrigin:`${-60+i*2}px 0`,boxShadow:'0 0 6px currentColor'}}/>
          ))}
        </div>
        <p style={{color:'#e2d9f3',fontFamily:"'Noto Serif KR',serif",fontSize:'1.05rem',fontWeight:300,letterSpacing:'0.06em',marginBottom:'16px'}}>{phases[phase]}</p>
        <div style={{width:'240px',height:'5px',background:'rgba(255,255,255,0.07)',borderRadius:'99px',overflow:'hidden',margin:'0 auto 10px'}}>
          <div style={{height:'100%',borderRadius:'99px',width:`${prog}%`,background:'linear-gradient(90deg,#7c3aed,#2563eb)',boxShadow:'0 0 8px rgba(139,92,246,0.8)',transition:'width .8s ease'}}/>
        </div>
        <div style={{display:'flex',gap:'6px',justifyContent:'center'}}>
          {phases.map((_,i)=><div key={i} style={{width:'6px',height:'6px',borderRadius:'50%',background:i<=phase?'#a78bfa':'#2a2a4a',boxShadow:i<=phase?'0 0 6px #a78bfa':'none',transition:'all .3s'}}/>)}
        </div>
        {phase>=5&&(
          <p style={{color:'rgba(167,139,250,0.5)',fontSize:'0.7rem',marginTop:'14px',letterSpacing:'0.04em',animation:'riseR .6s ease both'}}>
            ✦ AI 명리학 분석은 10~25초 소요됩니다...
          </p>
        )}
      </div>
    </div>
  );
}

/* ── MAIN APP ── */
function App(){
  const [form,setForm]=useState({name:'',chineseName:'',gender:'',birthdate:'',birthHour:'',city:'',mbti:'',concern:'',phone:'',email:'',agree:false});
  const [analyzing,setAnalyzing]=useState(false);
  const [report,setReport]=useState(null);
  const [errors,setErrors]=useState({});
  const [focused,setFocused]=useState(null);
  const [hoverC,setHoverC]=useState(null);
  const [shareOpen,setShareOpen]=useState(false);
  const [lottoOpen,setLottoOpen]=useState(false);
  const reportRef=useRef(null);
  const resultAnchor=useRef(null);

  const set=(k,v)=>setForm(f=>({...f,[k]:v}));

  const validate=()=>{
    const e={};
    if(!form.name.trim())e.name=true;
    if(!form.gender)e.gender=true;
    if(!form.birthdate)e.birthdate=true;
    if(!form.birthHour)e.birthHour=true;
    if(!form.mbti)e.mbti=true;
    if(!form.concern)e.concern=true;
    setErrors(e);
    return Object.keys(e).length===0;
  };

  /* ── 웹훅 전송: Make.com 구글시트 개별 필드 ── */
  const sendWebhook=async(data,lotto)=>{
    const now=new Date();
    const pad=n=>String(n).padStart(2,'0');
    const dateStr=`${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}`;
    const lottoStr=lotto.map((s,i)=>`세트${i+1}: ${s.join('-')}`).join(' | ');
    const nameVal=data.chineseName?`${data.name} (${data.chineseName})`:data.name;
    const payload={
      /* 구글시트 컬럼과 1:1 매핑 — 단순 flat JSON */
      "날짜":        dateStr,
      "이름":        nameVal,
      "생년월일":    data.birthdate,
      "태어난시간":  data.birthHour,
      "성별":        data.gender==='male'?'남성':data.gender==='female'?'여성':'',
      "태어난도시":  data.city||'',
      "MBTI":        data.mbti,
      "고민내용":    CONCERN_KR[data.concern]||data.concern,
      "추천로또번호":lottoStr,
      "유료결제여부":"Free",
      "전화번호":    data.phone||'',
      "이메일":      data.email||'',
    };
    try{
      await fetch(WEBHOOK,{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify(payload),
      });
    }catch(e){console.log('Webhook error:',e);}
  };

  const handleSubmit=()=>{
    if(!validate())return;
    /* GA4 이벤트 — 동의 여부와 무관하게 항상 발생 */
    if(typeof gtag==='function'){
      gtag('event','saju_analysis_click',{mbti:form.mbti,concern:form.concern,agreed:form.agree});
      gtag('event','complete_saju_analysis',{mbti:form.mbti,concern:form.concern,gender:form.gender,birth_year:(form.birthdate||'').slice(0,4),agreed:form.agree});
    }
    setReport(null);
    setAnalyzing(true);
    /* Gemini API 호출 — 애니메이션 유지하면서 비동기 실행 */
    handleDone();
  };

  /* ── Gemini 지수 백오프 재시도 ── */
  const fetchWithBackoff=async(options,maxRetries=3)=>{
    let lastErr;
    for(let attempt=0;attempt<maxRetries;attempt++){
      try{
        const res=await fetch(GEMINI_URL,options);
        if(res.status===429){
          const wait=Math.pow(2,attempt)*1500+Math.random()*500;
          console.warn('[Gemini 429] '+(attempt+1)+'/'+maxRetries+'회, '+Math.round(wait/1000)+'초 대기 후 재시도...');
          await new Promise(function(r){setTimeout(r,wait);});
          lastErr=new Error('HTTP_429');
          continue;
        }
        return res;
      }catch(netErr){
        lastErr=netErr;
        if(attempt<maxRetries-1){
          const wait=Math.pow(2,attempt)*1000;
          await new Promise(function(r){setTimeout(r,wait);});
        }
      }
    }
    throw lastErr||new Error('NETWORK_ERROR');
  };

  const callGemini=async function(f,localRep){
    const CKR={wealth:'재물·금전',love:'애정·관계',career:'커리어·직업',health:'건강·활력',mentor:'귀인·인복',study:'학업·시험운'};
    const sj=localRep.sj||{};
    const domName=(localRep.dom&&localRep.dom.name)||'';
    const weakName=localRep.weakName||'';

    /* 프롬프트: 문자열 배열 join — 내부에 백틱 없음 */
    var lines=[
      '당신은 사주명리학 40년 경력의 대가입니다.',
      '아래 사주 정보를 바탕으로 격국(格局), 용신(用神), 신강/신약을 포함한 전문 분석을 수행한 후,',
      '반드시 순수 JSON 형식으로만 응답하십시오.',
      '',
      '[사용자 정보]',
      '이름: '+(f.name||'익명')+(f.chineseName?' ('+f.chineseName+')':''),
      '성별: '+(f.gender==='male'?'남성':'여성'),
      '생년월일: '+(f.birthdate||'')+' / 띠: '+(sj.tiTxt||''),
      '출생시간: '+(f.birthHour||'모름')+'시',
      '출생지: '+(f.city||'미입력'),
      'MBTI: '+(f.mbti||''),
      '핵심 고민: '+(CKR[f.concern]||f.concern||''),
      '',
      '[사전 계산된 사주]',
      '연주: '+(sj.ySaju||'미상'),
      '월지: '+(sj.mJi||'미상'),
      '일주: '+(sj.dGan||'')+(sj.dJi||'')+'일주',
      '시지: '+(sj.hJi||'미상'),
      '주도 오행: '+domName,
      '용신 후보(약한 오행): '+weakName,
      '',
      '[분석 필수 항목]',
      '1. 격국(格局): 일주와 월지의 관계로 정격/변격 판단',
      '2. 신강/신약: 일간 세력 판단 후 억부용신 적용',
      '3. 용신(用神)과 기신(忌神): 보완 오행과 피해야 할 오행',
      '4. MBTI '+(f.mbti||'')+' 와 사주의 교차 분석',
      '5. 고민 ['+(CKR[f.concern]||'')+'] 에 대한 구체적 전문 조언 — 가장 상세히',
      '6. 모든 시기는 X월~Y월 형식으로 명시',
      '',
      '[출력 규칙]',
      '- 순수 JSON 객체만 출력. 코드블록이나 마크다운 절대 금지',
      '- 텍스트 필드 값은 줄바꿈 없이 한 줄로 작성',
      '- overall 350자 이상, 각 항목 250자 이상',
      '- 뻔한 표현 금지',
      '- lotto: 1~45 중복 없는 숫자 6개씩 5세트, 사주 오행 기반 생성',
      '',
      '[응답 형식 — 이 구조 그대로, 값만 채울 것]',
      '{"overall":"...","wealthDeep":"...","loveDeep":"...","careerDeep":"...","healthDeep":"...","habitDeep":"...","mentorDeep":"...","studyDeep":"...","lotto":[[n,n,n,n,n,n],[n,n,n,n,n,n],[n,n,n,n,n,n],[n,n,n,n,n,n],[n,n,n,n,n,n]]}'
    ];
    var prompt=lines.join('\n');

    /* API 호출 */
    var requestBody=JSON.stringify({
      contents:[{parts:[{text:prompt}]}],
      generationConfig:{temperature:0.85,topP:0.95,maxOutputTokens:4096}
    });
    var requestOptions={
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:requestBody
    };

    var res;
    try{
      res=await fetchWithBackoff(requestOptions,3);
    }catch(netErr){
      console.error('[Gemini 네트워크 실패]',netErr);
      throw new Error(netErr.message||'NETWORK_ERROR');
    }

    if(!res.ok){
      var status=res.status;
      var body=await res.text().catch(function(){return '';});
      console.error('[Gemini HTTP '+status+']',body.slice(0,300));
      throw new Error('HTTP_'+status);
    }

    var data=await res.json();
    var raw=(data&&data.candidates&&data.candidates[0]&&
             data.candidates[0].content&&data.candidates[0].content.parts&&
             data.candidates[0].content.parts[0]&&
             data.candidates[0].content.parts[0].text)||'';

    if(!raw){
      console.error('[Gemini 빈 응답]',JSON.stringify(data).slice(0,400));
      throw new Error('EMPTY_RESPONSE');
    }
    console.log('[Gemini 원본]',raw.slice(0,200));

    /* JSON 추출 파이프라인 */
    var c=raw.replace(/```json/gi,'').replace(/```/g,'').trim();
    var s2=c.indexOf('{');
    var e2=c.lastIndexOf('}');
    if(s2<0||e2<=s2){
      console.error('[JSON 추출 실패]',c.slice(0,200));
      throw new Error('JSON_NOT_FOUND');
    }
    c=c.slice(s2,e2+1);
    /* 문자열 값 내부 실제 개행 → \\n 치환 */
    c=c.replace(/"((?:[^"\\]|\\.)*)"/g,function(m,v){
      return '"'+v.replace(/\r?\n/g,'\\n')+'"';
    });
    /* 제어문자 제거 */
    c=c.replace(/[\x00-\x08\x0b\x0c\x0e-\x1f]/g,'');

    var parsed;
    try{
      parsed=JSON.parse(c);
    }catch(pe){
      console.error('[JSON 파싱 실패]',pe.message,c.slice(0,300));
      throw new Error('PARSE_ERROR');
    }
    console.log('[Gemini 파싱 성공]',Object.keys(parsed).join(', '));
    return parsed;
  };

      const aiData=await callGemini(form,localRep);

      let finalLotto=localRep.lotto; /* 기본값: 로컬 생성 */
      if(Array.isArray(aiData.lotto)&&aiData.lotto.length>=5){
        /* 각 세트가 유효한 배열인지 검증 */
        const validLotto=aiData.lotto
          .slice(0,5)
          .map(set=>{
            if(!Array.isArray(set))return null;
            const nums=set.map(Number).filter(n=>n>=1&&n<=45);
            const unique=[...new Set(nums)];
            return unique.length>=6?unique.slice(0,6).sort((a,b)=>a-b):null;
          })
          .filter(Boolean);
        if(validLotto.length>=5) finalLotto=validLotto;
      }

      const merged={

        loveDeep:   aiData.loveDeep   ||localRep.loveDeep,

      /* 5) API 오류 — 콘솔에 상세 출력, 사용자에게 에러 코드 포함 안내 */

      setTimeout(()=>resultAnchor.current?.scrollIntoView({behavior:'smooth',block:'start'}),200);
    }
  },[form]);

            <button onClick={handleReset} style={{width:'100%',padding:'14px',borderRadius:'14px',background:'rgba(255,255,255,.025)',border:'1px solid rgba(167,139,250,.18)',color:'rgba(167,139,250,.65)',fontSize:'0.8rem',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:'6px',marginBottom:'20px',letterSpacing:'0.06em'}}>
              ↺ 처음부터 다시 분석하기
            </button>
          </>
        )}

        {/* ─── 푸터 ─── */}
        <div style={{textAlign:'center',paddingBottom:'20px',borderTop:'1px solid rgba(255,255,255,0.04)',paddingTop:'16px'}}>
          <p style={{color:'rgba(167,139,250,.18)',fontSize:'0.6rem',letterSpacing:'0.08em'}}>© 2026 MY SAJU MASTER · Powered by Cosmic Intelligence<br/>All rights reserved · mysajumaster.com</p>
        </div>
      </div>

      {analyzing&&<Analyzing/>}
      {shareOpen&&report&&<ShareModal report={report} form={form} onClose={()=>setShareOpen(false)}/>}
      {lottoOpen&&report&&<LottoCopyModal lotto={report.lotto} onClose={()=>setLottoOpen(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
