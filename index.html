<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아우름 AI 사주 - 실시간 분석</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-stone-50 text-stone-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // ★ 절대 건드리지 마세요! 깃허브 로봇이 배포할 때만 실제 키로 바꿔줍니다.
        const API_KEY = 'YOUR_API_KEY_PLACEHOLDER';

        function SajuApp() {
            const [name, setName] = useState('');
            const [birth, setBirth] = useState('');
            const [result, setResult] = useState('');
            const [loading, setLoading] = useState(false);

            const analyzeSaju = async () => {
                if (!name || !birth) return alert("성함과 생년월일을 알려주세요.");
                setLoading(true);
                setResult("");

                // 표준 v1beta 주소와 모델명 사용
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{
                                parts: [{ text: `${name}님(생년월일: ${birth})의 올해 운세를 명리학적으로 아주 자세히 분석해줘.` }]
                            }]
                        })
                    });

                    const data = await response.json();
                    if (response.ok) {
                        setResult(data.candidates[0].content.parts[0].text);
                    } else {
                        setResult(`분석 실패: ${data.error.message}`);
                    }
                } catch (err) {
                    setResult("서버와 연결이 원활하지 않습니다.");
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="max-w-md mx-auto min-h-screen flex flex-col justify-center p-6">
                    <div className="bg-white rounded-3xl shadow-2xl p-8 border border-stone-200">
                        <h1 className="text-3xl font-serif font-bold text-center text-stone-800 mb-2">아우름 사주</h1>
                        <p className="text-center text-stone-500 mb-8 italic">AI가 읽어주는 당신의 천기</p>
                        
                        <div className="space-y-4">
                            <input className="w-full p-4 bg-stone-50 border-none rounded-2xl focus:ring-2 focus:ring-stone-300 transition-all"
                                placeholder="성함" value={name} onChange={e=>setName(e.target.value)} />
                            <input className="w-full p-4 bg-stone-50 border-none rounded-2xl focus:ring-2 focus:ring-stone-300 transition-all"
                                placeholder="생년월일 (예: 1985.05.20)" value={birth} onChange={e=>setBirth(e.target.value)} />
                            <button onClick={analyzeSaju} disabled={loading}
                                className="w-full bg-stone-800 text-white p-4 rounded-2xl font-bold hover:bg-stone-700 transition-colors disabled:bg-stone-300">
                                {loading ? "천기를 읽는 중..." : "운세 분석하기"}
                            </button>
                        </div>

                        {result && (
                            <div className="mt-8 p-6 bg-stone-50 rounded-2xl border border-stone-100 text-stone-700 leading-relaxed whitespace-pre-wrap animate-fade-in">
                                <h2 className="font-bold text-stone-800 mb-4">📜 분석 결과</h2>
                                {result}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<SajuApp />);
    </script>
</body>
</html>
