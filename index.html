<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>My Saju Master — MBTI × 사주 심층 분석</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600&family=Noto+Sans+KR:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
/* ─── 디자인 가이드 (기존 유지) ─── */
*{box-sizing:border-box;margin:0;padding:0}
body{background:#050510;font-family:'Noto Sans KR',sans-serif;color:#e2d9f3;overflow-x:hidden}
.star-bg { position:fixed; top:0; left:0; width:100%; height:100%; z-index:-1; pointer-events:none; }
.star { position:absolute; background:#fff; border-radius:50%; opacity:0.3; animation:twinkle 3s infinite; }
@keyframes twinkle { 0%,100%{opacity:0.2} 50%{opacity:0.8} }

.container { max-width:480px; margin:0 auto; padding:20px; }
header { text-align:center; margin:40px 0; }
.shimmer { background:linear-gradient(90deg,#a78bfa,#60a5fa,#f0abfc,#a78bfa); background-size:200% auto; -webkit-background-clip:text; -webkit-text-fill-color:transparent; animation:sh 4s linear infinite; }
@keyframes sh { 0%{background-position:200% center} 100%{background-position:-200% center} }

/* 입력 폼 스타일 */
.sec { background:rgba(255,255,255,.03); border:1px solid rgba(255,255,255,.08); border-radius:16px; padding:18px; margin-bottom:12px; }
.lbl { font-size:11px; color:#a78bfa; margin-bottom:8px; display:block; font-weight:600; letter-spacing:0.05em; }
.inp { width:100%; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:10px; padding:12px; color:#fff; font-size:14px; outline:none; }
.btn-main { width:100%; padding:18px; border-radius:15px; background:linear-gradient(135deg,#7c3aed,#2563eb); color:#fff; border:none; font-weight:700; cursor:pointer; box-shadow:0 10px 20px rgba(124,58,237,0.3); }

/* 결과 카드 및 아코디언 */
.capture-box { background:#050510; padding:40px 20px; }
.rcard { background:rgba(255,255,255,.03); border:1px solid rgba(167,139,250,.2); border-radius:20px; padding:25px; }
.acc-item { margin-bottom:10px; }
.acc-head { width:100%; padding:15px; background:rgba(255,255,255,0.04); border:none; border-radius:10px; color:#fff; display:flex; justify-content:space-between; cursor:pointer; }
.acc-body { max-height:0; overflow:hidden; transition:0.3s; background:rgba(0,0,0,0.2); border-radius:0 0 10px 10px; }
.acc-body.open { max-height:1000px; padding:15px; border:1px solid rgba(167,139,250,0.1); border-top:none; }

#overlay { display:none; position:fixed; inset:0; background:rgba(5,5,16,0.95); z-index:1000; align-items:center; justify-content:center; flex-direction:column; }
</style>
</head>
<body>

<div id="overlay">
    <div style="width:40px; height:40px; border:3px solid #a78bfa; border-top-color:transparent; border-radius:50%; animation:twinkle 1s infinite linear;"></div>
    <p style="margin-top:20px; font-family:'Noto Serif KR';">우주의 에너지를 분석 중입니다...</p>
</div>

<div class="star-bg" id="star-bg"></div>

<div class="container">
    <header id="main-header">
        <h1 style="font-family:'Noto Serif KR'; font-size:32px;">MY SAJU <span class="shimmer">MASTER</span></h1>
    </header>

    <div id="form-section">
        <div class="sec"><label class="lbl">이름</label><input type="text" id="name" class="inp" placeholder="성함"></div>
        <div class="sec">
            <div style="display:flex; gap:10px;">
                <div style="flex:1;"><label class="lbl">생년월일</label><input type="date" id="birth" class="inp"></div>
                <div style="flex:1;"><label class="lbl">태어난 시간</label><input type="time" id="birthTime" class="inp"></div>
            </div>
        </div>
        <div class="sec">
            <div style="display:flex; gap:10px;">
                <div style="flex:1;"><label class="lbl">성별</label><select id="gender" class="inp"><option value="male">남성</option><option value="female">여성</option></select></div>
                <div style="flex:1;"><label class="lbl">MBTI</label><input type="text" id="mbti" class="inp" placeholder="예: INFJ"></div>
            </div>
        </div>
        <div class="sec"><label class="lbl">전화번호 (선택)</label><input type="tel" id="phone" class="inp" placeholder="010-0000-0000"></div>
        <div class="sec"><label class="lbl">이메일 (선택)</label><input type="email" id="email" class="inp" placeholder="example@mail.com"></div>
        <div class="sec"><label class="lbl">고민 상담 내용</label><textarea id="concern" class="inp" style="height:80px;" placeholder="가장 궁금한 운세를 적어주세요."></textarea></div>
        
        <button class="btn-main" onclick="handleSubmit()">나의 운명 분석하기 ✨</button>
    </div>

    <div id="result-section" style="display:none;">
        <div id="capture-1" class="capture-box">
            <div class="rcard">
                <h2 id="res-name" style="font-family:'Noto Serif KR'; text-align:center; color:#a78bfa;"></h2>
                <hr style="border:0; height:1px; background:rgba(167,139,250,0.3); margin:20px 0;">
                <p id="res-summary" style="line-height:1.8; font-size:15px;"></p>
            </div>
        </div>

        <div id="capture-2" class="capture-box">
            <div class="rcard">
                <h3 style="font-size:16px; margin-bottom:15px; color:#a78bfa;">심층 분야별 분석</h3>
                <div id="acc-list"></div>
            </div>
        </div>

        <div id="capture-3" class="capture-box">
            <div class="rcard">
                <h3 style="font-size:16px; margin-bottom:15px; color:#fbbf24;">🍀 행운의 추천 로또</h3>
                <div id="res-lotto" style="background:rgba(251,191,36,0.1); padding:15px; border-radius:12px; font-size:13px; color:#fbbf24; line-height:1.6;"></div>
                <div style="margin-top:20px; font-size:12px; color:rgba(255,255,255,0.4); text-align:center;">mysajumaster.com</div>
            </div>
        </div>

        <button class="btn-main" style="background:#a78bfa;" onclick="saveImages()">💾 인스타 저장 (3장 분할)</button>
        <button onclick="location.reload()" style="width:100%; margin-top:15px; background:none; border:none; color:#666; cursor:pointer;">처음으로 돌아가기</button>
    </div>
</div>

<script>
// 1. 별빛 배경 생성
const starBg = document.getElementById('star-bg');
for(let i=0; i<100; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    star.style.left = Math.random()*100 + '%';
    star.style.top = Math.random()*100 + '%';
    star.style.width = star.style.height = Math.random()*3 + 'px';
    star.style.animationDelay = Math.random()*3 + 's';
    starBg.appendChild(star);
}

// 2. 데이터 전송 및 처리 (index2 방식 적용)
const WEBHOOK_URL = "https://hook.us1.make.com/c7gwi6t5kgu2rfwn37skdwptr71hyyxx";

async function handleSubmit() {
    const data = {
        date: new Date().toISOString(),
        name: document.getElementById('name').value,
        birth: document.getElementById('birth').value,
        birthTime: document.getElementById('birthTime').value,
        gender: document.getElementById('gender').value,
        mbti: document.getElementById('mbti').value,
        concern: document.getElementById('concern').value,
        lotto: generateLotto(),
        isPaid: 'Free',
        phone: document.getElementById('phone').value,
        email: document.getElementById('email').value
    };

    if(!data.name || !data.birth) return alert("이름과 생년월일은 필수입니다.");

    document.getElementById('overlay').style.display = 'flex';

    // Make.com 전송 (index2의 JSON 전송 방식)
    fetch(WEBHOOK_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
    }).catch(e => console.log("전송실패 무시"));

    // 결과 표시 (전송 성공 여부 기다리지 않고 즉시 실행)
    setTimeout(() => {
        showResults(data);
    }, 1500);
}

function generateLotto() {
    let sets = [];
    for(let i=0; i<5; i++){
        let nums = new Set();
        while(nums.size < 6) nums.add(Math.floor(Math.random()*45)+1);
        sets.push(Array.from(nums).sort((a,b)=>a-b).join(', '));
    }
    return sets.join(' | ');
}

function showResults(data) {
    document.getElementById('overlay').style.display = 'none';
    document.getElementById('form-section').style.display = 'none';
    document.getElementById('result-section').style.display = 'block';

    document.getElementById('res-name').innerText = `${data.name}님의 운명 리포트`;
    document.getElementById('res-summary').innerText = `${data.name}님은 ${data.mbti}의 기질과 사주의 조화가 매우 인상적입니다. 특히 ${data.concern}에 대한 고민은 올해 하반기에 귀인의 도움으로 해결될 운명입니다.`;
    document.getElementById('res-lotto').innerText = data.lotto;

    const accList = document.getElementById('acc-list');
    const sections = ["재물운", "애정운", "건강운", "명예운"];
    accList.innerHTML = '';
    sections.forEach((s, idx) => {
        const item = document.createElement('div');
        item.className = 'acc-item';
        // 고민 내용이 제목에 포함되어 있으면 자동 오픈
        const isOpen = data.concern.includes(s.substring(0,2)) ? 'open' : ''; 
        item.innerHTML = `
            <button class="acc-head" onclick="this.nextElementSibling.classList.toggle('open')"><span>${s}</span><span>▾</span></button>
            <div class="acc-body ${isOpen}"><p style="font-size:13px; color:#aaa; line-height:1.6;">현재 우주의 기운이 ${s} 방향으로 강력하게 흐르고 있습니다. 본인의 장점을 살린다면 좋은 성과가 있을 것입니다.</p></div>
        `;
        accList.appendChild(item);
    });
}

// 3. 인스타 3장 분할 저장 로직 (버그 수정 포함)
async function saveImages() {
    const btn = event.target;
    btn.innerText = "저장 중...";
    
    // [버그 해결] 캡처 전 모든 아코디언 강제 오픈
    const bodies = document.querySelectorAll('.acc-body');
    const states = Array.from(bodies).map(b => b.classList.contains('open'));
    bodies.forEach(b => {
        b.style.maxHeight = 'none';
        b.style.padding = '15px';
        b.style.border = '1px solid rgba(167,139,250,0.1)';
    });

    try {
        for(let i=1; i<=3; i++) {
            const canvas = await html2canvas(document.getElementById(`capture-${i}`), {
                backgroundColor: '#050510',
                scale: 2
            });
            const link = document.createElement('a');
            link.download = `saju_report_${i}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
            // 브라우저 다운로드 꼬임 방지 간격
            await new Promise(r => setTimeout(r, 600));
        }
        alert("3장의 리포트가 사진첩(다운로드 폴더)에 저장되었습니다!");
    } catch(e) {
        alert("저장 실패: " + e);
    } finally {
        // 아코디언 상태 복구
        bodies.forEach((b, i) => {
            if(!states[i]) {
                b.style.maxHeight = '0';
                b.style.padding = '0';
                b.style.border = 'none';
            }
        });
        btn.innerText = "💾 인스타 저장 (3장 분할)";
    }
}
</script>
</body>
</html>
